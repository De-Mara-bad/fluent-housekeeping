<script>
// Generate app icon as canvas and set as apple-touch-icon
(function(){
  try{
    const c=document.createElement('canvas');c.width=180;c.height=180;
    const ctx=c.getContext('2d');
    // Background
    const r=30;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(180-r,0);
    ctx.quadraticCurveTo(180,0,180,r);ctx.lineTo(180,180-r);
    ctx.quadraticCurveTo(180,180,180-r,180);ctx.lineTo(r,180);
    ctx.quadraticCurveTo(0,180,0,180-r);ctx.lineTo(0,r);
    ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    ctx.fillStyle='#0072CF';ctx.fill();
    // Diamond ◈
    ctx.fillStyle='#ffffff';ctx.font='bold 90px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('◈',90,88);
    // "FLUENT" text
    ctx.font='bold 22px sans-serif';ctx.fillText('FLUENT',90,148);
    document.getElementById('apple-icon').href=c.toDataURL('image/png');
  }catch(e){}
})();

// ── SERVICE WORKER (for offline + installability + update detection) ──
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='fluent-v2';
const ASSETS=[self.location.href];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))
  .then(()=>self.clients.claim())
));
self.addEventListener('fetch',e=>e.respondWith(
  fetch(e.request).then(res=>{
    if(res&&res.status===200){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}
    return res;
  }).catch(()=>caches.match(e.request))
));
self.addEventListener('message',e=>{
  if(e.data==='skipWaiting') self.skipWaiting();
});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg=>{
    // Check for updates every time the page loads
    reg.update();

    // A new service worker is waiting — show the update banner
    function checkForWaiting(r){
      if(r.waiting){
        showUpdateBanner(r.waiting);
      }
    }
    checkForWaiting(reg);

    reg.addEventListener('updatefound',()=>{
      const newWorker=reg.installing;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
          showUpdateBanner(newWorker);
        }
      });
    });
  }).catch(()=>{});

  // When the new SW takes over, reload to apply update
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;window.location.reload();}
  });
}

function showUpdateBanner(worker){
  if(document.getElementById('update-banner'))return;
  const banner=document.createElement('div');
  banner.id='update-banner';
  banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);'+
    'background:#0072CF;color:#fff;padding:12px 20px;border-radius:50px;'+
    'display:flex;align-items:center;gap:12px;z-index:10000;box-shadow:0 4px 20px rgba(0,114,207,.5);'+
    'font-family:Inter,system-ui,sans-serif;font-size:12px;font-weight:700;white-space:nowrap;'+
    'animation:slideDown .3s ease;';
  // Add animation keyframe
  if(!document.getElementById('update-banner-style')){
    const s=document.createElement('style');
    s.id='update-banner-style';
    s.textContent='@keyframes slideDown{from{top:-60px;opacity:0}to{top:16px;opacity:1}}';
    document.head.appendChild(s);
  }
  banner.innerHTML='<span>🔄 Update available</span>'+
    '<button id="update-btn" style="background:#fff;color:#0072CF;border:none;'+
    'padding:6px 14px;border-radius:20px;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit">UPDATE NOW</button>'+
    '<button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:rgba(255,255,255,.7);'+
    'font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>';
  document.body.appendChild(banner);
  document.getElementById('update-btn').addEventListener('click',()=>{
    banner.innerHTML='<span>⏳ Updating…</span>';
    worker.postMessage('skipWaiting');
  });
}

// ── INSTALL PROMPT ──
let _installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_installPrompt=e;
  // Show install banner after 3 seconds if not already installed
  setTimeout(showInstallBanner,3000);
});
window.addEventListener('appinstalled',()=>{
  _installPrompt=null;
  const b=document.getElementById('install-banner');
  if(b)b.remove();
});

function showInstallBanner(){
  if(!_installPrompt||document.getElementById('install-banner'))return;
  const banner=document.createElement('div');
  banner.id='install-banner';
  banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);'+
    'background:#0072CF;color:#fff;padding:12px 20px;border-radius:50px;'+
    'display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 4px 20px rgba(0,114,207,.4);'+
    'font-family:Inter,system-ui,sans-serif;font-size:12px;font-weight:700;white-space:nowrap;';
  banner.innerHTML='<span>📲 Install Fluent as an app</span>'+
    '<button onclick="triggerInstall()" style="background:#fff;color:#0072CF;border:none;'+
    'padding:6px 14px;border-radius:20px;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit">INSTALL</button>'+
    '<button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:rgba(255,255,255,.7);'+
    'font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>';
  document.body.appendChild(banner);
}

function triggerInstall(){
  if(!_installPrompt)return;
  _installPrompt.prompt();
  _installPrompt.userChoice.then(()=>{_installPrompt=null;});
  const b=document.getElementById('install-banner');if(b)b.remove();
}
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Core surfaces ── */
  --bg:#F4F6FA;
  --surface:#FFFFFF;
  --surface2:#EEF1F7;
  --border:#DDE2EF;
  --border-strong:#C4CEDD;

  /* ── Text ── */
  --text:#111111;
  --muted:#444444;
  --dim:#B8C2D4;

  /* ── Brand & accent palette ── */
  --cyan:#0072CF;       /* primary blue */
  --cyan-light:#E8F3FC;
  --green:#00A86B;      /* success */
  --green-light:#E6F7F1;
  --amber:#E8920A;      /* warning */
  --amber-light:#FEF4E4;
  --red:#D63B3B;        /* danger */
  --red-light:#FDEAEA;
  --violet:#6A4FC8;     /* cleaners / schedule */
  --violet-light:#F0ECFB;
  --teal:#0096A0;       /* roster / check-in */
  --teal-light:#E5F6F7;
  --orange:#E06020;     /* flagged accent */
  --orange-light:#FDF0E8;
  --pink:#C4006C;       /* 2-bed accent */
  --pink-light:#FCE8F3;

  --font-d:'Playfair Display',Georgia,serif;
  --font-m:'Inter',system-ui,sans-serif;
  --r:10px;--rs:6px;

  /* ── Shadows ── */
  --shadow-sm:0 1px 4px rgba(26,32,53,.08);
  --shadow:0 2px 12px rgba(26,32,53,.10);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-m);font-size:13px;overflow-x:hidden}
button{cursor:pointer;font-family:var(--font-m);border:none;outline:none}
select,input{font-family:var(--font-m);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#login-screen{align-items:center;justify-content:center;
  background:linear-gradient(135deg,#E8F3FC 0%,#F4F6FA 40%,#F0ECFB 100%)}
.login-box{width:380px;max-width:94vw;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:44px 36px;text-align:center;box-shadow:var(--shadow)}
.login-logo{display:block;margin-bottom:4px}
.login-sub{color:var(--muted);font-size:10px;letter-spacing:.14em;margin-bottom:28px}
.login-tabs{display:flex;gap:8px;margin-bottom:22px}
.login-tab{flex:1;padding:10px;border-radius:var(--rs);background:var(--surface2);color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.08em;transition:.2s;border:1px solid var(--border)}
.login-tab.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.field{margin-bottom:13px;text-align:left}
.field label{display:block;font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:5px;font-weight:600}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-size:12px;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--cyan);background:#fff;box-shadow:0 0 0 3px var(--cyan-light)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--rs);font-weight:700;font-size:11px;letter-spacing:.05em;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--cyan);color:#fff;box-shadow:0 2px 6px rgba(0,114,207,.25)}.btn-primary:hover{background:#005FAD}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-light)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 2px 6px rgba(0,168,107,.25)}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red-light);color:var(--red);border:1px solid #F5C0C0}
.btn-danger{background:var(--red);color:#fff}
.btn-violet{background:var(--violet);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-sm{padding:5px 11px;font-size:10px}
.btn-full{width:100%}
.err{color:var(--red);font-size:11px;margin-top:8px}
.ok{color:var(--green);font-size:11px;margin-top:8px}

/* ── MANAGER LAYOUT ── */
#manager-screen{flex-direction:row}
.sidebar{width:232px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:var(--shadow-sm)}
.sidebar-logo{padding:20px 18px 16px;font-family:var(--font-d);font-size:17px;font-weight:900;color:var(--cyan);letter-spacing:.01em;border-bottom:1px solid var(--border)}
.sidebar-logo span{font-size:9px;font-family:var(--font-m);color:var(--muted);display:block;font-weight:400;margin-top:2px;letter-spacing:.1em}
.nav-section{padding:14px 16px 4px;font-size:9px;color:var(--muted);letter-spacing:.14em;font-weight:700;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 8px;border-radius:var(--rs);
  color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:.15s;border:none;
  background:transparent;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--cyan-light);color:var(--cyan);border-left:3px solid var(--cyan);padding-left:11px;font-weight:700}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px}
.sidebar-bottom{margin-top:auto;padding:14px;border-top:1px solid var(--border);background:var(--surface2)}
.cleaner-badge{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;margin-bottom:10px;text-align:center;box-shadow:var(--shadow-sm)}
.cleaner-badge .num{font-size:22px;font-weight:800;color:var(--violet)}
.cleaner-badge .lbl{font-size:9px;color:var(--muted);letter-spacing:.08em;font-weight:600}
.season-toggle{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.season-btn{padding:4px 12px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;transition:.15s;border:1px solid var(--border)}
.season-peak.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.season-off.active{background:#3B82F6;color:#fff;border-color:#3B82F6}
.season-btn:not(.active){background:var(--surface);color:var(--muted)}
.main-content{flex:1;overflow-y:auto;padding:24px;min-width:0;background:var(--bg)}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.topbar h1{font-family:var(--font-d);font-size:21px;font-weight:900;color:var(--text);flex:1;min-width:0}
.clock{font-size:19px;font-weight:700;color:var(--cyan);letter-spacing:.06em;font-family:var(--font-m)}
.pressure-chip{padding:5px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em}
.p-high{background:var(--red-light);color:var(--red);border:1px solid #F5C0C0}
.p-med{background:var(--amber-light);color:var(--amber);border:1px solid #F5D89A}
.p-low{background:var(--green-light);color:var(--green);border:1px solid #A3DFC7}

/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--surface);border-radius:var(--r);padding:16px;border-top:4px solid var(--border);box-shadow:var(--shadow-sm)}
.kpi-label{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px;font-weight:600}
.kpi-val{font-size:26px;font-weight:800}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:3px}

/* ── TIME BAR ── */
.time-bar-wrap{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.time-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600}
.time-bar-track{height:12px;background:var(--surface2);border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--border)}
.time-bar-fill{height:100%;border-radius:8px;transition:width .6s}
.time-bar-now{position:absolute;top:0;bottom:0;width:2px;background:var(--red)}
.time-bar-info{margin-top:8px;font-size:10px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.card-title{font-size:9px;color:var(--muted);letter-spacing:.12em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;font-weight:700;text-transform:uppercase}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:9px;color:var(--muted);letter-spacing:.08em;padding:6px 10px;font-weight:700;border-bottom:2px solid var(--border);text-transform:uppercase}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── ROOM GRID ── */
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px}
.room-card{background:var(--surface);border-radius:var(--r);padding:14px;border:1px solid var(--border);position:relative;overflow:hidden;transition:.2s;box-shadow:var(--shadow-sm)}
.room-card:hover{box-shadow:var(--shadow);border-color:var(--border-strong)}
.room-card.flagged{border-color:#F5C0C0;background:var(--red-light)}
.room-card.in_progress{border-color:#F5D89A;background:var(--amber-light)}
.room-card.done{opacity:.7}
.room-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px}
.room-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.room-num{font-size:14px;font-weight:700;color:var(--text)}
.room-type-tag{font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:12px}
.status-chip{font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:12px}
.chip-pending{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.chip-in_progress{background:var(--amber-light);color:var(--amber);border:1px solid #F5D89A}
.chip-done{background:var(--green-light);color:var(--green);border:1px solid #A3DFC7}
.chip-flagged{background:var(--red-light);color:var(--red);border:1px solid #F5C0C0}
.mini-bar{height:5px;background:var(--surface2);border-radius:3px;margin:6px 0;border:1px solid var(--border)}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.room-actions{display:flex;gap:6px;margin-top:10px}
.room-actions .btn{flex:1}

/* ── FILTERS ── */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filter-bar select,.filter-bar input[type=date]{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:11px;box-shadow:var(--shadow-sm)}
.filter-bar .count{margin-left:auto;font-size:11px;color:var(--muted)}

/* ── BUILDING TABS ── */
.bld-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:20px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.bld-tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;white-space:nowrap;transition:.15s;flex-shrink:0;box-shadow:var(--shadow-sm)}
.bld-tab.active{background:var(--cyan);color:#fff;border-color:var(--cyan);box-shadow:0 2px 8px rgba(0,114,207,.3)}
.bld-tab:hover:not(.active){border-color:var(--cyan);color:var(--cyan);background:var(--cyan-light)}

/* ── GANTT ── */
.gantt-row{margin-bottom:16px}
.gantt-label{font-size:11px;font-weight:700;margin-bottom:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--text)}
.gantt-track{height:28px;background:var(--surface2);border-radius:6px;position:relative;overflow:hidden;border:1px solid var(--border)}
.gantt-block{position:absolute;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;border-right:1px solid rgba(255,255,255,.3);overflow:hidden;cursor:default}
.gantt-now{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:5}
.gantt-ticks{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px}

/* ── CLEANER PERFORMANCE CARDS ── */
.cleaner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:12px}
.cleaner-card{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.cleaner-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.eff-ring{width:52px;height:52px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid}
.stat-bar{margin-bottom:8px}
.stat-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px}

/* ── ROSTER ── */
.roster-date-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.roster-date-nav h2{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--text)}
.roster-date-nav input[type=date]{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;color:var(--text);font-size:12px;box-shadow:var(--shadow-sm)}
.roster-table-wrap{overflow-x:auto}
.roster-table{width:100%;border-collapse:collapse;min-width:600px}
.roster-table th{text-align:left;font-size:9px;color:var(--muted);letter-spacing:.08em;padding:8px 10px;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap;text-transform:uppercase;background:var(--surface2)}
.roster-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.roster-table tr:hover td{background:var(--surface2)}
.roster-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:.04em}
.rb-checkout{background:var(--amber-light);color:var(--amber);border:1px solid #F5D89A}
.rb-checkin{background:var(--green-light);color:var(--green);border:1px solid #A3DFC7}
.rb-both{background:var(--violet-light);color:var(--violet);border:1px solid #C9BEF0}
.rb-stay{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.rb-departed{background:#E0F4F5;color:var(--teal);border:1px solid #9ADCE0}
.rb-inhouse{background:#EEE8FF;color:var(--violet);border:1px solid #C9BEF0}
.roster-unit-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:4px 9px;color:var(--text);font-family:var(--font-m);font-size:11px;width:110px}
.roster-unit-input:focus{border-color:var(--cyan);outline:none;background:#fff}

/* ── DRAG SCHEDULE BUILDER ── */
.sched-builder{display:grid;grid-template-columns:300px 1fr;gap:16px;min-height:500px}
.sched-pool{background:var(--surface);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.sched-pool-title{font-size:9px;color:var(--muted);letter-spacing:.12em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-weight:700;text-transform:uppercase}
.sched-pool-list{display:flex;flex-direction:column;gap:6px;min-height:60px}
.sched-unit-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;cursor:pointer;transition:.15s;user-select:none}
.sched-unit-pill:hover{border-color:var(--cyan);background:var(--cyan-light)}
.sched-unit-pill.selected{border-color:var(--cyan);background:var(--cyan-light);box-shadow:0 0 0 2px var(--cyan);font-weight:700}
.sched-pill-num{font-weight:700;font-size:13px;color:var(--text)}
.sched-pill-type{font-size:9px;font-weight:700}
.sched-pill-mins{margin-left:auto;font-size:10px;color:var(--muted)}
.sched-cleaner-col{display:flex;flex-direction:column;gap:10px}
.sched-cleaner-lane{background:var(--surface);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.sched-cleaner-lane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sched-cleaner-name{font-size:13px;font-weight:700;color:var(--text)}
.sched-lane-stats{font-size:10px;color:var(--muted)}
.sched-drop-zone{min-height:44px;border:2px dashed var(--border);border-radius:var(--rs);padding:6px;display:flex;flex-direction:column;gap:5px;transition:.15s;background:var(--surface2)}
.sched-drop-zone.tap-ready{border-color:var(--cyan);background:var(--cyan-light);cursor:pointer}
.sched-drop-zone.empty::after{content:'Tap to assign selected unit';font-size:10px;color:var(--muted);padding:10px;text-align:center;display:block}
.sched-assigned-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;cursor:grab;user-select:none;transition:.15s;box-shadow:var(--shadow-sm)}
.sched-assigned-pill:hover{border-color:var(--red);background:var(--red-light)}
.sched-assigned-pill .remove-btn{margin-left:auto;color:var(--muted);font-size:14px;cursor:pointer;line-height:1;flex-shrink:0}
.sched-assigned-pill .remove-btn:hover{color:var(--red)}
.sched-time-tag{font-size:9px;color:var(--muted);margin-left:auto;margin-right:4px}
.sched-gantt-mini{margin-top:8px;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--border)}
.sched-gantt-seg{height:100%}

/* ── MANAGE ── */
.unit-manage-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--border)}
.unit-manage-row:first-child{border-top:none}
.cleaner-manage-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border)}
.cleaner-manage-row:first-child{border-top:none}
.cleaner-edit-name{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;color:var(--text);font-family:var(--font-m);font-size:12px;flex:1}
.cleaner-edit-name:focus{border-color:var(--cyan);outline:none;background:#fff}
.cleaner-edit-pin{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 8px;color:var(--text);font-family:var(--font-m);font-size:12px;width:72px}
.cleaner-edit-pin:focus{border-color:var(--cyan);outline:none;background:#fff}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,32,53,.45);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:460px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(26,32,53,.18)}
.modal h2{font-family:var(--font-d);font-size:17px;font-weight:900;margin-bottom:16px;color:var(--text)}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap}

/* ── CLEANER APP (mobile) ── */
#cleaner-screen{background:var(--bg);max-width:430px;margin:0 auto}
.ca-header{background:var(--surface);padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
.ca-logo{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--cyan)}
.ca-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px;background:var(--surface);margin-bottom:2px;border-bottom:1px solid var(--border)}
.ca-stat{text-align:center;background:var(--surface2);border-radius:var(--rs);padding:12px 4px;border:1px solid var(--border)}
.ca-stat .num{font-size:20px;font-weight:800}
.ca-stat .lbl{font-size:9px;color:var(--muted);letter-spacing:.08em;margin-top:1px;font-weight:600}
.ca-section-label{padding:8px 16px;font-size:9px;color:var(--muted);letter-spacing:.12em;background:var(--surface2);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border)}
.ca-room-list{padding:10px 14px;display:flex;flex-direction:column;gap:10px}
.ca-room{background:var(--surface);border-radius:var(--r);padding:15px;border:1px solid var(--border);position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.ca-room.ca-active{border-color:#F5D89A;background:var(--amber-light)}
.ca-room.ca-done-item{opacity:.65}
.ca-room.ca-flagged{border-color:#F5C0C0;background:var(--red-light)}
.ca-room-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ca-room-num{font-size:17px;font-weight:800;color:var(--text)}
.ca-timer{font-size:24px;font-weight:800;color:var(--amber);text-align:center;padding:8px 0;letter-spacing:.04em}
.ca-timer.over{color:var(--red)}
.ca-room-actions{display:flex;gap:8px;margin-top:11px}
.ca-room-actions .btn{flex:1;padding:14px 0;font-size:13px}
.ca-bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--surface);border-top:2px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom,14px);box-shadow:0 -2px 12px rgba(26,32,53,.08)}
.ca-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.06em;cursor:pointer;padding:5px;transition:.15s;text-transform:uppercase}
.ca-nav-item.active{color:var(--cyan)}
.ca-nav-icon{font-size:18px}

/* ── HISTORY VIEW ── */
.hist-filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.hist-filter-bar select,.hist-filter-bar input[type=date]{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:11px;box-shadow:var(--shadow-sm)}
.hist-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:16px}
.hist-day-card{background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border);cursor:pointer;transition:.2s;box-shadow:var(--shadow-sm)}
.hist-day-card:hover{box-shadow:var(--shadow);border-color:var(--cyan)}
.hist-day-card.selected{border-color:var(--cyan);background:var(--cyan-light);box-shadow:0 0 0 2px var(--cyan)}
.hist-day-date{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--text)}
.hist-day-stats{font-size:10px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.hist-detail-table{width:100%;border-collapse:collapse}
.hist-detail-table th{text-align:left;font-size:9px;color:var(--muted);letter-spacing:.08em;padding:7px 10px;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap;text-transform:uppercase;background:var(--surface2)}
.hist-detail-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle}
.hist-detail-table tr:hover td{background:var(--surface2)}
.eff-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700}
.eff-good{background:var(--green-light);color:var(--green);border:1px solid #A3DFC7}
.eff-warn{background:var(--amber-light);color:var(--amber);border:1px solid #F5D89A}
.eff-bad{background:var(--red-light);color:var(--red);border:1px solid #F5C0C0}
.export-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:16px 18px;background:var(--cyan-light);border-radius:var(--r);margin-bottom:16px;border:1px solid #B8D9F5}
.export-bar h3{font-family:var(--font-d);font-size:14px;font-weight:700;flex:1;color:var(--cyan)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .22s ease both}
@media(max-width:900px){.sched-builder{grid-template-columns:1fr}}

/* ── MOBILE MANAGER ── */
@media(max-width:700px){
  /* Hide desktop sidebar */
  .sidebar{display:none!important}
  #manager-screen{flex-direction:column}

  /* Full width content with bottom nav space */
  .main-content{padding:10px 10px 80px 10px;min-width:0}

  /* Mobile top header */
  #mgr-mobile-header{
    display:flex!important;
    position:sticky;top:0;z-index:100;
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:10px 14px;align-items:center;gap:10px;box-shadow:var(--shadow-sm);
  }
  #mgr-mobile-header img{height:26px}
  #mgr-mobile-bld-select{
    flex:1;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--rs);padding:6px 10px;font-family:var(--font-m);
    font-size:12px;color:var(--text);font-weight:600;
  }
  #mgr-mobile-season{
    padding:6px 10px;border-radius:var(--rs);border:1px solid var(--border);
    background:var(--surface2);font-family:var(--font-m);font-size:11px;
    font-weight:700;color:var(--text);cursor:pointer;
  }

  /* Mobile bottom nav */
  #mgr-bottom-nav{
    display:flex!important;
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:var(--surface);border-top:2px solid var(--border);
    box-shadow:0 -2px 12px rgba(26,32,53,.08);
    padding:6px 0 env(safe-area-inset-bottom,10px);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #mgr-bottom-nav::-webkit-scrollbar{display:none}
  .mgr-nav-item{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:4px 10px;cursor:pointer;transition:.15s;flex-shrink:0;
    font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.04em;
    text-transform:uppercase;min-width:58px;border:none;background:transparent;
    font-family:var(--font-m);
  }
  .mgr-nav-item.active{color:var(--cyan)}
  .mgr-nav-item .mgr-nav-icon{font-size:19px;line-height:1}
  .mgr-nav-item .mgr-badge{
    position:absolute;top:2px;right:6px;
    background:var(--red);color:#fff;border-radius:10px;
    padding:0 4px;font-size:8px;font-weight:700;
  }

  /* Layout fixes for mobile */
  .bld-tabs{display:none!important}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .room-grid{grid-template-columns:1fr}
  .cleaner-grid{grid-template-columns:1fr}
  .hist-summary-grid{grid-template-columns:1fr 1fr}
  table{font-size:11px}
  th,td{padding:6px 6px}
  .topbar h1{font-size:16px}
  .card{padding:12px}
  .kpi{padding:12px}
  .kpi-val{font-size:20px}

  /* Inspection mobile */
  #manager-main .fi[style*="grid-template-columns:300px"]{grid-template-columns:1fr!important}

  /* Shift counter buttons */
  .cleaner-badge .num{font-size:18px}
}

/* Desktop: hide mobile elements */
@media(min-width:701px){
  #mgr-mobile-header{display:none!important}
  #mgr-bottom-nav{display:none!important}
}
</style>

    <button class="nav-item" onclick="mgNav('history')" id="nav-history">🗃 History</button>

        <div style="display:flex;align-items:center;justify-content:center;gap:10px">

          <div>

          <button onclick="changeShiftCount(1)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);width:28px;height:28px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">+</button>

function makeRoom(bldId,number,type,floor){
  return {id:`${bldId}-r${Date.now()}-${Math.random().toString(36).slice(2,6)}`,number:String(number),type,floor:floor!=null?floor:1,status:'PENDING',assignedTo:null,startedAt:null,completedAt:null,duration:null};
}
function generateGroundFloor(bldId){
  // 4 default Compact Studio units on ground floor — editable in Manage
  return [1,2,3,4].map((n,i)=>{
    // Stagger IDs so they don't collide
    const room=makeRoom(bldId,`G${String(n).padStart(2,'0')}`,'COMPACT',0);
    return room;
  });
}
function generateRoomsFromUnits(bldId,unitDef){
  // Ground floor first (G01-G04), then upper floors
  const groundFloor=generateGroundFloor(bldId);
  const rooms=[...groundFloor];
  let seq=1;
  unitDef.forEach(({type,count})=>{
    for(let i=0;i<count;i++){
      const floor=Math.ceil(seq/12),pos=seq%12||12;
      rooms.push(makeRoom(bldId,`${floor}${String(pos).padStart(2,'0')}`,type,floor));
      seq++;
    }
  });
  return rooms;
}

function migrateState(s){
  // Ensure all REAL_BUILDINGS exist — but NEVER overwrite existing buildings' rooms
  REAL_BUILDINGS.forEach(rb=>{
    if(!s.buildings.find(b=>b.id===rb.id)){
      // Only add if completely missing
      s.buildings.push({id:rb.id,name:rb.name,short:rb.short,unitDef:rb.units,rooms:generateRoomsFromUnits(rb.id,rb.units)});
    }
  });
  // Ensure every building has at least one ground floor unit — add only if none exist
  // This does NOT remove or change any existing rooms
  s.buildings.forEach(bld=>{
    const hasGround=bld.rooms.some(r=>String(r.number).startsWith('G'));
    if(!hasGround){
      const gf=generateGroundFloor(bld.id);
      bld.rooms.unshift(...gf);
    }
  });
  if(!s.roster)s.roster={};
  if(!s.schedules)s.schedules={};
  if(!s.history)s.history={};
  if(!s.inspections)s.inspections={};
  if(s.cleanersOnShift==null)s.cleanersOnShift=s.season==='peak'?6:3;
  // Migrate to multi-manager system
  if(!s.managers){
    s.managers=[
      {id:'m1',name:'De-Mara',pin:s.managerPass||'1234'},
      {id:'m2',name:'Anita',pin:''},
      {id:'m3',name:'Ludwig',pin:''},
    ];
  }
  return s;
}

// Save to Firestore (debounced 800ms so rapid changes don't flood the DB)
function saveState(){
  // Always mirror to localStorage as offline backup
  try{localStorage.setItem('fluent_hs_backup',JSON.stringify(state));}catch{}

  // Debounce Firestore write
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    try{
      await window._setDoc(
        window._doc(window._db,'app','state'),
        {data:JSON.stringify(state),updatedAt:Date.now()}
      );
    }catch(e){
      console.warn('Firestore save failed, data safe in localStorage backup:',e.message);
    }
  },800);
}

// Load from Firestore once, then subscribe to real-time changes
async function loadState(){
  showLoadingMsg('Connecting to database...');
  try{
    const ref=window._doc(window._db,'app','state');

    // Retry up to 3 times with delay (handles brief offline moments)
    let snap=null;
    for(let attempt=1;attempt<=3;attempt++){
      try{
        snap=await window._getDoc(ref);
        break;
      }catch(err){
        if(attempt<3){
          showLoadingMsg(`Connecting... (attempt ${attempt}/3)`);
          await new Promise(r=>setTimeout(r,2000));
        }else{throw err;}
      }
    }

    if(snap.exists()&&snap.data().data){
      state=migrateState(JSON.parse(snap.data().data));
      showLoadingMsg('Data loaded ✓');
    } else {
      // First time — check localStorage backup, else use defaults
      const backup=localStorage.getItem('fluent_hs_backup')||localStorage.getItem('fluent_hs4');
      if(backup){
        state=migrateState(JSON.parse(backup));
        showLoadingMsg('Migrating local data to cloud...');
        await saveStateNow();
      } else {
        state=defaultState();
        showLoadingMsg('Creating new database...');
        await saveStateNow();
      }
    }

    // Subscribe to real-time updates (so multiple devices stay in sync)
    // We track our own save timestamps to avoid overwriting our own changes
    _unsubscribe=window._onSnapshot(ref,docSnap=>{
      if(!docSnap.exists()||!docSnap.data().data)return;
      const incoming=docSnap.data();
      // Ignore if this update was written by us (within last 5 seconds)
      const isOurOwnSave=incoming.updatedAt&&(Date.now()-incoming.updatedAt)<5000&&_saveTimer===null;
      // Also ignore if we have a pending save — our version is newer
      if(isOurOwnSave||_saveTimer)return;
      // Only apply if this truly came from another device
      state=migrateState(JSON.parse(incoming.data));
      if(document.getElementById('manager-screen').classList.contains('active')){
        renderManagerMain();
        updateShiftDisplay();
      }
    });

    return true;
  }catch(e){
    console.error('Firebase load failed:',e);
    try{
      const backup=localStorage.getItem('fluent_hs_backup')||localStorage.getItem('fluent_hs4');
      if(backup){state=migrateState(JSON.parse(backup));showLoadingMsg('⚠ Offline mode — using local backup');}
      else{state=defaultState();showLoadingMsg('⚠ Offline mode — starting fresh');}
    }catch{state=defaultState();}
    return false;
  }
}

async function saveStateNow(){
  try{
    await window._setDoc(
      window._doc(window._db,'app','state'),
      {data:JSON.stringify(state),updatedAt:Date.now()}
    );
  }catch(e){console.warn('Firestore write failed:',e.message);}
}

function showLoadingMsg(msg){
  const el=document.getElementById('loading-msg');

}

function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function timeStr(m){const h=Math.floor(m/60)%24,mn=m%60;return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;}
function fmtFloor(f){return f===0||f==='0'?'Ground Floor':`Floor ${f}`;}
function activeCleaner(){
  const count=state.cleanersOnShift!=null?state.cleanersOnShift:(state.season==='peak'?6:3);
  return state.cleaners.slice(0,Math.min(count,state.cleaners.length));
}
function currentBld(){return state.buildings.find(b=>b.id===state.activeBuilding)||state.buildings[0];}
function currentRooms(){return(currentBld()||{rooms:[]}).rooms;}
function updateRoom(bldId,roomId,patch){
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const idx=bld.rooms.findIndex(r=>r.id===roomId);if(idx<0)return;
  bld.rooms[idx]={...bld.rooms[idx],...patch};saveState();
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Roster helpers ──
function getRosterEntry(bldId,dateStr,roomId){
  return state.roster?.[bldId]?.[dateStr]?.[roomId]||{checkout:false,checkin:false,departed:false,guest:''};
}
function setRosterEntry(bldId,dateStr,roomId,patch){
  if(!state.roster[bldId])state.roster[bldId]={};
  if(!state.roster[bldId][dateStr])state.roster[bldId][dateStr]={};
  const cur=state.roster[bldId][dateStr][roomId]||{checkout:false,checkin:false,departed:false,guest:''};
  state.roster[bldId][dateStr][roomId]={...cur,...patch};

}

// ── Schedule helpers ──
function getSchedule(bldId,dateStr,cleanerId){

}

//  HISTORICAL DATA SNAPSHOT
// ═══════════════════════════════════════════
// Call this when resetting a building's day — saves a permanent record
function snapshotDay(bldId){
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const dateStr=todayStr();
  const rooms=bld.rooms;
  const hasActivity=rooms.some(r=>r.status!=='PENDING'||r.duration);
  if(!hasActivity)return; // nothing to save

  if(!state.history[bldId])state.history[bldId]={};

  // Build cleaner records
  const cleanerMap={};
  state.cleaners.forEach(c=>{cleanerMap[c.id]=c.name;});

  const records=rooms.map(r=>{
    const rt=RT[r.type];
    const roster=getRosterEntry(bldId,dateStr,r.id);
    const targetMins=roster.departed?rt.depMins:rt.mins;
    const effPct=r.duration?Math.round((r.duration/targetMins)*100):null;
    return {
      unit:r.number, floor:r.floor, type:rt.label,
      expectedMins:targetMins,
      depClean:roster.departed||false,
      actualMins:r.duration||null,
      efficiencyPct:effPct,
      status:r.status,
      cleaner:r.assignedTo?cleanerMap[r.assignedTo]||r.assignedTo:'Unassigned',
      cleanerId:r.assignedTo||null,
      checkout:roster.checkout||false,
      checkin:roster.checkin||false,
      departed:roster.departed||false,
      inhouse:roster.inhouse||false,
      guest:roster.guest||'',
      completedAt:r.completedAt||null,
    };
  });

  state.history[bldId][dateStr]={
    date:dateStr,
    buildingName:bld.name,
    savedAt:new Date().toISOString(),
    totalUnits:rooms.length,
    done:rooms.filter(r=>r.status==='DONE').length,
    flagged:rooms.filter(r=>r.status==='FLAGGED').length,
    records,
  };
  saveState();
}

// Auto-snapshot every day at midnight (or on first load of a new day)
let _lastSnapshotDate='';
function checkDailySnapshot(){
  const today=todayStr();
  if(_lastSnapshotDate===today)return;
  _lastSnapshotDate=today;
  // If any building had data from yesterday, it's already been snapshotted on reset
  // This is a safety net — snapshot anything with completedAt from previous days
  state.buildings.forEach(bld=>{
    const hasOldData=bld.rooms.some(r=>r.completedAt&&new Date(r.completedAt).toISOString().slice(0,10)<today);
    if(hasOldData)snapshotDay(bld.id);
  });
}

function toggleMic(bldId,dateStr,roomId){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert('Speech recognition is not supported in this browser.\nTry Chrome on Android or desktop Chrome.');
    return;
  }
  const btnId='mic-btn-'+roomId;
  const statusId='mic-status-'+roomId;
  const textareaId='insp-notes-'+roomId;

  if(_speechActive&&_speechRecognition){
    _speechRecognition.stop();
    return;
  }

  const recognition=new SpeechRecognition();
  _speechRecognition=recognition;
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='en-ZA'; // South African English — falls back to en-GB/en-US

  const textarea=document.getElementById(textareaId);
  const btn=document.getElementById(btnId);
  const statusEl=document.getElementById(statusId);
  const existingText=textarea?textarea.value:'';

  recognition.onstart=()=>{
    _speechActive=true;
    if(btn){btn.style.background='var(--red-light)';btn.style.borderColor='var(--red)';btn.textContent='⏹';}
    if(statusEl){statusEl.textContent='🎤 Listening... speak your notes';statusEl.style.color='var(--red)';}
  };

  let interimText='';
  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    if(final&&textarea){
      interimText='';
      textarea.value=existingText+(existingText&&!existingText.endsWith(' ')?'\n':'')+final;
      saveInspNotes(bldId,dateStr,roomId,textarea.value);
    }
    if(statusEl&&interim) statusEl.textContent='🎤 '+interim;
  };

  recognition.onerror=(e)=>{
    _speechActive=false;
    if(btn){btn.style.background='var(--surface)';btn.style.borderColor='var(--border)';btn.textContent='🎤';}
    if(statusEl){
      const msg=e.error==='not-allowed'?'Microphone access denied — check browser permissions':
                 e.error==='no-speech'?'No speech detected — try again':'Error: '+e.error;
      statusEl.textContent=msg;statusEl.style.color='var(--red)';
    }
  };

  recognition.onend=()=>{
    _speechActive=false;
    if(btn){btn.style.background='var(--surface)';btn.style.borderColor='var(--border)';btn.textContent='🎤';}
    if(statusEl){statusEl.textContent='✓ Done — notes saved';statusEl.style.color='var(--green)';}
    setTimeout(()=>{if(statusEl)statusEl.textContent='';},3000);
  };

  recognition.start();
}

  return `

function exportToExcel(bldId,dateStr){
  // Export a single day
  const bld=state.buildings.find(b=>b.id===bldId);
  if(!bld){alert('Building not found.');return;}
  const day=state.history[bldId]?.[dateStr];
  if(!day){alert('No history found for this day.');return;}

function exportAllToExcel(bldIdFilter){
  // Collect all history
  const days=[];
  state.buildings.forEach(b=>{
    if(bldIdFilter!=='all'&&b.id!==bldIdFilter)return;
    const bldHist=state.history[b.id]||{};
    Object.values(bldHist).forEach(day=>days.push(day));
  });
  if(!days.length&&!Object.keys(state.inspections||{}).length){
    alert('No historical data to export yet.\nComplete and reset a day first to generate records.');return;
  }
  days.sort((a,b)=>a.date.localeCompare(b.date));
  const label=bldIdFilter==='all'?'All_Buildings':state.buildings.find(b=>b.id===bldIdFilter)?.name||bldIdFilter;
  generateExcel(days,label+'_Full_History',bldIdFilter);
}

function generateExcel(days,filename,bldIdFilter='all'){
  if(typeof XLSX==='undefined'){alert('Excel library not loaded. Please check your internet connection.');return;}
  const wb=XLSX.utils.book_new();

  // ── Sheet 1: Cleaning Report (every unit for every day) ──
  const reportRows=[['Date','Building','Unit','Floor','Type','Cleaner','Status','Expected (min)','Departure Clean Target (min)','Actual (min)','Efficiency %','Over/Under','Checkout','Check-in','Departed','In House Cleaning','Guest','Completed At']];
  days.forEach(day=>{
    day.records.forEach(r=>{
      const rtEx=RT[Object.keys(RT).find(k=>RT[k].label===r.type)||'COMPACT'];
      const depTarget=rtEx?rtEx.depMins:'';
      const overUnder=r.actualMins?r.actualMins-r.expectedMins:null;
      reportRows.push([
        day.date,
        day.buildingName,
        r.unit, r.floor, r.type,
        r.cleaner, r.status,
        r.expectedMins,
        r.departed?depTarget:'',
        r.actualMins||'',
        r.efficiencyPct||'',
        overUnder!=null?(overUnder>0?'+'+overUnder:overUnder)+'min':'',
        r.checkout?'YES':'NO',
        r.checkin?'YES':'NO',
        r.departed?'YES':'NO',
        r.inhouse?'YES':'NO',
        r.guest||'',
        r.completedAt?new Date(r.completedAt).toLocaleString():'',
      ]);
    });
  });
  const wsReport=XLSX.utils.aoa_to_sheet(reportRows);
  // Column widths
  wsReport['!cols']=[{wch:12},{wch:22},{wch:8},{wch:6},{wch:18},{wch:18},{wch:12},{wch:14},{wch:22},{wch:12},{wch:13},{wch:12},{wch:10},{wch:10},{wch:10},{wch:18},{wch:20},{wch:20}];
  styleHeaderRow(wsReport,reportRows[0].length);
  XLSX.utils.book_append_sheet(wb,wsReport,'Cleaning Report');

  // ── Sheet 2: Roster (check-in / check-out by date) ──
  const rosterRows=[['Date','Building','Unit','Floor','Type','Guest','Checkout','Check-in','Departed','In House Cleaning','Turnover']];
  days.forEach(day=>{
    day.records.filter(r=>r.checkout||r.checkin||r.departed||r.inhouse).forEach(r=>{
      rosterRows.push([
        day.date, day.buildingName,
        r.unit, r.floor, r.type,
        r.guest||'',
        r.checkout?'YES':'NO',
        r.checkin?'YES':'NO',
        r.departed?'YES':'NO',
        r.inhouse?'YES':'NO',
        r.checkout&&r.checkin?'YES':'NO',
      ]);
    });
  });
  if(rosterRows.length===1)rosterRows.push(['No roster data recorded','','','','','','','','','','']);
  const wsRoster=XLSX.utils.aoa_to_sheet(rosterRows);
  wsRoster['!cols']=[{wch:12},{wch:22},{wch:8},{wch:6},{wch:18},{wch:20},{wch:10},{wch:10},{wch:10},{wch:18},{wch:10}];
  styleHeaderRow(wsRoster,rosterRows[0].length);
  XLSX.utils.book_append_sheet(wb,wsRoster,'Roster');

  // ── Sheet 3: Cleaner Summary (one row per cleaner per day) ──
  const summaryRows=[['Date','Building','Cleaner','Units Assigned','Units Done','Units Flagged','Total Expected (min)','Total Actual (min)','Avg Efficiency %','Completion Rate %']];
  days.forEach(day=>{
    const byCleanerMap={};
    day.records.forEach(r=>{
      if(!byCleanerMap[r.cleaner])byCleanerMap[r.cleaner]={name:r.cleaner,assigned:0,done:0,flagged:0,expMin:0,actMin:0};
      const c=byCleanerMap[r.cleaner];
      c.assigned++;
      if(r.status==='DONE')c.done++;
      if(r.status==='FLAGGED')c.flagged++;
      c.expMin+=r.expectedMins;
      if(r.actualMins)c.actMin+=r.actualMins;
    });
    Object.values(byCleanerMap).forEach(c=>{
      const avgEff=c.expMin&&c.actMin?Math.round((c.actMin/c.expMin)*100):'';
      const compRate=c.assigned?Math.round(((c.done+c.flagged)/c.assigned)*100):'';
      summaryRows.push([
        day.date, day.buildingName, c.name,
        c.assigned, c.done, c.flagged,
        c.expMin, c.actMin||'',
        avgEff, compRate,
      ]);
    });
  });
  const wsSummary=XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary['!cols']=[{wch:12},{wch:22},{wch:18},{wch:15},{wch:12},{wch:14},{wch:20},{wch:18},{wch:18},{wch:16}];
  styleHeaderRow(wsSummary,summaryRows[0].length);
  XLSX.utils.book_append_sheet(wb,wsSummary,'Cleaner Summary');

  // ── Sheet 4: Daily Totals ──
  const totalsRows=[['Date','Building','Total Units','Done','Flagged','Pending','Completion %','Checkouts','Check-ins','Turnovers']];
  days.forEach(day=>{
    const checkouts=day.records.filter(r=>r.checkout).length;
    const checkins=day.records.filter(r=>r.checkin).length;
    const turnovers=day.records.filter(r=>r.checkout&&r.checkin).length;
    const compPct=day.totalUnits?Math.round(((day.done+day.flagged)/day.totalUnits)*100):'';
    totalsRows.push([
      day.date, day.buildingName, day.totalUnits,
      day.done, day.flagged, day.totalUnits-day.done-day.flagged,
      compPct, checkouts, checkins, turnovers,
    ]);
  });
  const wsTotals=XLSX.utils.aoa_to_sheet(totalsRows);
  wsTotals['!cols']=[{wch:12},{wch:22},{wch:13},{wch:8},{wch:10},{wch:10},{wch:14},{wch:11},{wch:11},{wch:11}];
  styleHeaderRow(wsTotals,totalsRows[0].length);
  XLSX.utils.book_append_sheet(wb,wsTotals,'Daily Totals');

  // ── Sheet 5: Inspections (manager notes, ratings, checklist) ──
  const inspRows=[['Date','Building','Unit','Floor','Type','Rating','Notes','Inspector Time',
    // Checklist columns
    'Toilet Cleaned','Shower/Bath Scrubbed','Basin Clean','Mirror Spotless','Fresh Towels','Toiletries Restocked',
    'Beds Made','Pillowcases Fresh','Duvet Straight','Wardrobes Wiped','Surfaces Dusted','Floors Vacuumed',
    'Dishes Clean','Counters Wiped','Stovetop Clean','Sink Clean','Fridge Exterior Clean','Bin Emptied',
    'Surfaces Dusted (Living)','Floors Clean (Living)','Windows Wiped','Cushions Arranged','TV Remote Present',
    'Lights Working','No Damage Noted','Aircon/Heating Set','Extra Linen Stocked','Welcome Pack Placed'
  ]];

  // Checklist item key map (matches INSP_CHECKLIST)
  const checklistKeys=[
    'bathroom__Toilet_cleaned','bathroom__Shower/bath_scrubbed','bathroom__Basin_clean',
    'bathroom__Mirror_spotless','bathroom__Fresh_towels','bathroom__Toiletries_restocked',
    'bedroom__Beds_made','bedroom__Pillowcases_fresh','bedroom__Duvet_straight',
    'bedroom__Wardrobes_wiped','bedroom__Surfaces_dusted','bedroom__Floors_vacuumed',
    'kitchen__Dishes_clean','kitchen__Counters_wiped','kitchen__Stovetop_clean',
    'kitchen__Sink_clean','kitchen__Fridge_exterior_clean','kitchen__Bin_emptied',
    'living__Surfaces_dusted','living__Floors_clean','living__Windows_wiped',
    'living__Cushions_arranged','living__TV_remote_present',
    'general__Lights_working','general__No_damage_noted','general__Aircon/heating_set',
    'general__Extra_linen_stocked','general__Welcome_pack_placed',
  ];

  // Collect inspections across all buildings/dates
  let hasInspData=false;
  state.buildings.forEach(bld=>{
    if(bldIdFilter!=='all'&&bld.id!==bldIdFilter)return;
    const bldInsp=state.inspections?.[bld.id]||{};
    Object.entries(bldInsp).forEach(([dateStr,dateInsp])=>{
      Object.entries(dateInsp).forEach(([roomId,insp])=>{
        if(!insp||(!insp.rating&&!insp.notes&&!Object.values(insp.items||{}).some(Boolean)))return;
        const room=bld.rooms.find(r=>r.id===roomId);
        const rt=room?RT[room.type]:null;
        const inspTime=insp.timestamp?new Date(insp.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
        const ratingLabel=insp.rating?insp.rating.charAt(0).toUpperCase()+insp.rating.slice(1):'';
        const checklistVals=checklistKeys.map(key=>{
          // Normalise key: space→underscore
          const normKey=key.replace(/ /g,'_');
          return (insp.items?.[normKey]||insp.items?.[key])?'✓':'';
        });
        inspRows.push([
          dateStr,
          bld.name,
          room?room.number:roomId,
          room?fmtFloor(room.floor):'',
          rt?rt.label:'',
          ratingLabel,
          insp.notes||'',
          inspTime,
          ...checklistVals,
        ]);
        hasInspData=true;
      });
    });
  });

  if(!hasInspData){
    inspRows.push(['No inspection data recorded yet','','','','','','','']);
  }

  const wsInsp=XLSX.utils.aoa_to_sheet(inspRows);
  wsInsp['!cols']=[
    {wch:12},{wch:22},{wch:8},{wch:14},{wch:18},{wch:12},{wch:40},{wch:14},
    // Checklist columns — narrow
    ...Array(28).fill({wch:10})
  ];
  styleHeaderRow(wsInsp,inspRows[0].length);
  // Wrap text in Notes column (col G = index 6)
  Object.keys(wsInsp).filter(k=>!k.startsWith('!')).forEach(addr=>{
    const col=XLSX.utils.decode_cell(addr).c;
    if(col===6){// Notes column
      if(!wsInsp[addr].s)wsInsp[addr].s={};
      wsInsp[addr].s.alignment={wrapText:true,vertical:'top'};
    }
  });
  XLSX.utils.book_append_sheet(wb,wsInsp,'Inspections');

  XLSX.writeFile(wb,filename.replace(/[^a-zA-Z0-9_\-]/g,'_')+'.xlsx');
}

function styleHeaderRow(ws,numCols){
  // Bold + background for header row
  for(let c=0;c<numCols;c++){
    const addr=XLSX.utils.encode_cell({r:0,c});
    if(!ws[addr])continue;
    ws[addr].s={
      font:{bold:true,color:{rgb:'FFFFFF'},sz:11},
      fill:{patternType:'solid',fgColor:{rgb:'1E3A5F'}},
      alignment:{horizontal:'center',vertical:'center',wrapText:true},
      border:{bottom:{style:'medium',color:{rgb:'38BDF8'}}},
    };
  }
}

let loginRole='manager',currentCleaner=null,currentManager=null;
function setLoginRole(r){
  loginRole=r;
  document.querySelectorAll('.login-tab').forEach((el,i)=>el.classList.toggle('active',(r==='manager'&&i===0)||(r==='cleaner'&&i===1)));
  renderLoginForm();
}
function renderLoginForm(){
  const f=document.getElementById('login-form');
  document.getElementById('login-err').textContent='';
  const hintEl=document.getElementById('login-hint');
  if(hintEl)hintEl.textContent='';
  if(loginRole==='manager'){
    const opts=(state.managers||[]).map(m=>`<option value="${m.id}">${escH(m.name)}</option>`).join('');
    f.innerHTML=`<div class="field"><label>YOUR NAME</label><select id="mgr-select" onchange="updateManagerHint()">${opts}</select></div>
      <div class="field"><label>PIN</label><input type="password" id="mgr-pass" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">ENTER DASHBOARD →</button>`;
    setTimeout(updateManagerHint,0);
  }else{
    const opts=state.cleaners.map(c=>`<option value="${c.id}">${escH(c.name)}</option>`).join('');
    f.innerHTML=`<div class="field"><label>YOUR NAME</label><select id="cl-select">${opts}</select></div>
      <div class="field"><label>PIN</label><input type="password" id="cl-pin" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">START SHIFT →</button>`;
  }
}
function updateManagerHint(){
  const mid=(document.getElementById('mgr-select')||{}).value;
  const mgr=(state.managers||[]).find(m=>m.id===mid);
  const hintEl=document.getElementById('login-hint');
  if(hintEl)hintEl.textContent=mgr&&!mgr.pin?'First time? Enter a 4-digit PIN to set up your account.':'';
}
function doLogin(){
  document.getElementById('login-err').textContent='';
  if(loginRole==='manager'){
    const mid=(document.getElementById('mgr-select')||{}).value;
    const p=(document.getElementById('mgr-pass')||{}).value||'';
    const mgr=(state.managers||[]).find(m=>m.id===mid);
    if(!mgr){document.getElementById('login-err').textContent='Manager not found.';return;}
    // First-time login: PIN is empty — prompt to set one
    if(!mgr.pin){
      if(p.length<4){document.getElementById('login-err').textContent='Choose a 4-digit PIN to set up your account.';return;}
      if(!/^\d{4}$/.test(p)){document.getElementById('login-err').textContent='PIN must be exactly 4 digits.';return;}
      mgr.pin=p;
      saveState();
      currentManager=mgr;showScreen('manager');renderManager();
    }else{
      if(p===mgr.pin){currentManager=mgr;showScreen('manager');renderManager();}
      else document.getElementById('login-err').textContent='Incorrect PIN.';
    }
  }else{
    const cid=(document.getElementById('cl-select')||{}).value;
    const pin=(document.getElementById('cl-pin')||{}).value;
    const cl=state.cleaners.find(c=>c.id===cid);
    if(cl&&cl.pin===pin){currentCleaner=cl;showScreen('cleaner');renderCleaner();}
    else document.getElementById('login-err').textContent='Incorrect PIN.';
  }
}
function logout(){currentCleaner=null;currentManager=null;showScreen('login');renderLoginForm();}
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(n+'-screen').classList.add('active');}

//  OVERVIEW
// ═══════════════════════════════════════════
function renderOverview(bld,rooms){
  const now=nowMin(),total=rooms.length;
  const done=rooms.filter(r=>r.status==='DONE').length;
  const inprog=rooms.filter(r=>r.status==='IN_PROGRESS').length;
  const flagged=rooms.filter(r=>r.status==='FLAGGED').length;
  const pct=total?Math.round((done/total)*100):0;
  const minLeft=Math.max(0,CHECKIN_MIN-now);
  const workloadLeft=rooms.filter(r=>r.status!=='DONE').reduce((s,r)=>s+RT[r.type].mins,0);
  const cls=activeCleaner();
  const pressure=workloadLeft>cls.length*minLeft?'high':workloadLeft>cls.length*minLeft*0.75?'med':'low';
  const timePct=Math.min(100,Math.max(0,((now-CHECKOUT_MIN)/WINDOW)*100));
  const inWin=now>=CHECKOUT_MIN&&now<=CHECKIN_MIN;

  // Today's roster summary
  const todayRoster=state.roster?.[bld.id]?.[todayStr()]||{};
  const checkoutsToday=Object.values(todayRoster).filter(e=>e.checkout).length;
  const checkinsToday=Object.values(todayRoster).filter(e=>e.checkin).length;
  const departedToday=Object.values(todayRoster).filter(e=>e.departed).length;

  const typeRows=Object.entries(RT).map(([k,rt])=>{
    const tr=rooms.filter(r=>r.type===k);if(!tr.length)return'';
    const td=tr.filter(r=>r.status==='DONE').length;
    const pp=tr.length?Math.round((td/tr.length)*100):0;
    return `<div style="background:var(--surface2);border-radius:8px;padding:11px">
      <div style="color:${rt.color};font-weight:700;font-size:11px;margin-bottom:3px">${rt.icon} ${rt.short}</div>
      <div style="font-size:9px;color:var(--muted)">${tr.length} units · ${rt.mins}min ea.</div>
      <div class="mini-bar" style="margin-top:7px"><div class="mini-bar-fill" style="background:${rt.color};width:${pp}%"></div></div>
      <div style="font-size:9px;color:var(--muted)">${td}/${tr.length} done</div>
    </div>`;
  }).join('');

  const clRows=cls.map(c=>{
    const ar=rooms.filter(r=>r.assignedTo===c.id);
    const cd=ar.filter(r=>r.status==='DONE');
    const ci=ar.filter(r=>r.status==='IN_PROGRESS');
    let eff='—';
    if(cd.length){const avg=cd.reduce((s,r)=>s+(r.duration/RT[r.type].mins),0)/cd.length*100;eff=`<span style="color:${avg<=100?'var(--green)':avg<=125?'var(--amber)':'var(--red)'};font-weight:700">${Math.round(avg)}%</span>`;}
    return `<tr><td><b>${escH(c.name)}</b></td><td style="color:var(--muted)">${ar.length}</td><td style="color:var(--green)">${cd.length}</td><td style="color:var(--amber)">${ci.length}</td><td>${eff}</td></tr>`;
  }).join('');

  return `
  <div class="topbar">
    <div style="flex:1;min-width:0"><h1>${escH(bld.name)}</h1></div>
    <div class="pressure-chip p-${pressure}">${{high:'⚠ HIGH PRESSURE',med:'⚡ WATCH PACE',low:'✓ ON TRACK'}[pressure]}</div>
    <div class="clock">${timeStr(now)}</div>
  </div>
  <div class="time-bar-wrap fi">
    <div class="time-bar-labels"><span>CHECKOUT 10:00</span><span>${inWin?'NOW '+timeStr(now):'—'}</span><span>CHECK-IN 15:00</span></div>
    <div class="time-bar-track">
      <div class="time-bar-fill" style="width:${timePct}%;background:linear-gradient(90deg,var(--cyan),${minLeft<60?'var(--red)':'var(--green)'})"></div>
      ${inWin?`<div class="time-bar-now" style="left:${timePct}%"></div>`:''}
    </div>
    <div class="time-bar-info"><span>${minLeft}min remaining</span><span>~${Math.round(workloadLeft/Math.max(1,cls.length))}min/cleaner</span><span>${cls.length} cleaners</span></div>
  </div>
  <div class="kpi-grid fi">
    <div class="kpi" style="border-color:var(--cyan)"><div class="kpi-label">TOTAL UNITS</div><div class="kpi-val" style="color:var(--cyan)">${total}</div></div>
    <div class="kpi" style="border-color:var(--green)"><div class="kpi-label">COMPLETED</div><div class="kpi-val" style="color:var(--green)">${done}/${total}</div><div class="kpi-sub">${pct}%</div></div>
    <div class="kpi" style="border-color:var(--amber)"><div class="kpi-label">CHECKOUTS TODAY</div><div class="kpi-val" style="color:var(--amber)">${checkoutsToday}</div><div class="kpi-sub">${departedToday} departed</div></div>
    <div class="kpi" style="border-color:var(--green)"><div class="kpi-label">CHECK-INS TODAY</div><div class="kpi-val" style="color:var(--green)">${checkinsToday}</div><div class="kpi-sub">arriving today</div></div>
    <div class="kpi" style="border-color:var(--violet)"><div class="kpi-label">CLEANERS</div><div class="kpi-val" style="color:var(--violet)">${cls.length}</div><div class="kpi-sub">${state.season} season</div></div>
    <div class="kpi" style="border-color:var(--red)"><div class="kpi-label">FLAGGED</div><div class="kpi-val" style="color:var(--red)">${flagged}</div></div>
  </div>
  <div class="card fi"><div class="card-title">UNIT MIX</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px">${typeRows}</div>
  </div>
  <div class="card fi">
    <div class="card-title">CLEANER SUMMARY
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="autoAssign()">⚡ AUTO-ASSIGN</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="resetBuilding()">↺ Reset Day</button>
      </div>
    </div>
    <table><thead><tr><th>CLEANER</th><th>ASSIGNED</th><th>DONE</th><th>ACTIVE</th><th>EFFICIENCY</th></tr></thead>
    <tbody>${clRows||'<tr><td colspan="5" style="color:var(--muted)">No cleaners.</td></tr>'}</tbody></table>
  </div>`;
}

function renderRoster(bld,rooms){
  const dateStr=rosterDate;
  const rosterDay=state.roster?.[bld.id]?.[dateStr]||{};

  // Sort rooms by number
  const sorted=[...rooms].sort((a,b)=>{const an=parseInt(a.number)||0,bn=parseInt(b.number)||0;return an!==bn?an-bn:a.number.localeCompare(b.number);});

  const rows=sorted.map(room=>{
    const e=rosterDay[room.id]||{checkout:false,checkin:false,departed:false,inhouse:false,guest:''};
    const rt=RT[room.type];
    let badge='';
    if(e.checkout&&e.checkin) badge=`<span class="roster-badge rb-both">↕ BOTH</span>`;
    else if(e.checkout) badge=`<span class="roster-badge rb-checkout">↑ CHECK-OUT</span>`;
    else if(e.checkin)  badge=`<span class="roster-badge rb-checkin">↓ CHECK-IN</span>`;
    else badge=`<span class="roster-badge rb-stay">— STAY</span>`;
    if(e.departed) badge+=` <span class="roster-badge rb-departed">✓ DEPARTED</span>`;
    if(e.inhouse) badge+=` <span class="roster-badge rb-inhouse">🏠 IN HOUSE</span>`;

    const rowBg=e.departed?'background:#D6F4F6;':e.inhouse?'background:#EEE8FF;':'';

    return `<tr style="${rowBg}">
      <td><b>Unit ${escH(room.number)}</b></td>
      <td><span style="color:${rt.color};font-weight:600">${rt.icon} ${rt.short}</span></td>
      <td>Fl. ${room.floor}</td>
      <td>${badge}</td>
      <td>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--muted)">
          <input type="checkbox" onchange="setRoster('${bld.id}','${dateStr}','${room.id}','checkout',this.checked)" ${e.checkout?'checked':''}
            style="accent-color:var(--amber);width:14px;height:14px"/> Checkout
        </label>
      </td>
      <td>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--muted)">
          <input type="checkbox" onchange="setRoster('${bld.id}','${dateStr}','${room.id}','checkin',this.checked)" ${e.checkin?'checked':''}
            style="accent-color:var(--green);width:14px;height:14px"/> Check-in
        </label>
      </td>
      <td>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--muted)">
          <input type="checkbox" onchange="setRoster('${bld.id}','${dateStr}','${room.id}','departed',this.checked);renderManagerMain()" ${e.departed?'checked':''}
            style="accent-color:var(--teal);width:14px;height:14px"/> Departed
        </label>
      </td>
      <td>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--muted)">
          <input type="checkbox" onchange="setRoster('${bld.id}','${dateStr}','${room.id}','inhouse',this.checked);renderManagerMain()" ${e.inhouse?'checked':''}
            style="accent-color:var(--violet);width:14px;height:14px"/> In House
        </label>
      </td>
      <td>
        <input class="roster-unit-input" placeholder="Guest name (opt.)" value="${escH(e.guest||'')}"
          onchange="setRoster('${bld.id}','${dateStr}','${room.id}','guest',this.value)" 
          oninput="setRoster('${bld.id}','${dateStr}','${room.id}','guest',this.value)"/>
      </td>
    </tr>`;
  }).join('');

  const checkouts=Object.values(rosterDay).filter(e=>e.checkout).length;
  const checkins=Object.values(rosterDay).filter(e=>e.checkin).length;
  const both=Object.values(rosterDay).filter(e=>e.checkout&&e.checkin).length;
  const departed=Object.values(rosterDay).filter(e=>e.departed).length;
  const inhouse=Object.values(rosterDay).filter(e=>e.inhouse).length;

  return `
  <div class="topbar"><h1>${escH(bld.name)} — Daily Roster</h1></div>
  <div class="roster-date-nav fi">
    <button class="btn btn-ghost btn-sm" onclick="shiftRosterDate(-1)">← Prev</button>
    <input type="date" value="${dateStr}" onchange="rosterDate=this.value;renderManagerMain()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;color:var(--text);font-size:12px"/>
    <button class="btn btn-ghost btn-sm" onclick="shiftRosterDate(1)">Next →</button>
    <h2>${fmtDate(dateStr)}</h2>

  </div>

  <div class="card fi" style="margin-bottom:12px">
    <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:11px">
      <span>📤 <b style="color:var(--amber)">${checkouts}</b> check-outs</span>
      <span>📥 <b style="color:var(--green)">${checkins}</b> check-ins</span>
      <span>↕ <b style="color:var(--violet)">${both}</b> same-day turnovers</span>
      <span>✓ <b style="color:var(--teal)">${departed}</b> departed${checkouts?` of ${checkouts}`:''}</span>
      <span>🏠 <b style="color:var(--violet)">${inhouse}</b> in house cleaning</span>
    </div>
  </div>

  <div class="card fi">
    <div class="card-title">
      UNIT ROSTER FOR ${fmtDate(dateStr)}
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="markAllCheckout('${bld.id}','${dateStr}')">All Checkout</button>
        <button class="btn btn-ghost btn-sm" onclick="clearRosterDay('${bld.id}','${dateStr}')">Clear Day</button>
      </div>
    </div>
    <div class="roster-table-wrap">
      <table class="roster-table">
        <thead><tr><th>UNIT</th><th>TYPE</th><th>FLOOR</th><th>STATUS</th><th>CHECKOUT</th><th>CHECK-IN</th><th>DEPARTED</th><th>IN HOUSE</th><th>GUEST</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function shiftRosterDate(d){
  const dt=new Date(rosterDate);dt.setDate(dt.getDate()+d);rosterDate=dt.toISOString().slice(0,10);renderManagerMain();
}
function setRoster(bldId,dateStr,roomId,field,value){
  setRosterEntry(bldId,dateStr,roomId,{[field]:value});
  // update status chip badge without full re-render
  updateFlagBadge();
}
function markAllCheckout(bldId,dateStr){
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  bld.rooms.forEach(r=>setRosterEntry(bldId,dateStr,r.id,{checkout:true}));

}
function clearRosterDay(bldId,dateStr){
  if(!confirm('Clear all roster entries for this day?'))return;
  if(state.roster[bldId])delete state.roster[bldId][dateStr];
  saveState();renderManagerMain();
}

// ═══════════════════════════════════════════
//  DRAG-AND-DROP SCHEDULER
// ═══════════════════════════════════════════
// ── TAP-TO-ASSIGN SCHEDULER ──

function renderScheduler(bld,rooms){
  const dateStr=schedDate;
  const cls=activeCleaner();
  const allScheduled=getAllScheduled(bld.id,dateStr);
  const unscheduled=rooms.filter(r=>!allScheduled.includes(r.id));

  // Pool — unscheduled units
  const poolHtml=unscheduled.length?unscheduled.sort((a,b)=>{
    const an=parseInt(a.number)||0,bn=parseInt(b.number)||0;return an!==bn?an-bn:a.number.localeCompare(b.number);
  }).map(r=>{
    const rt=RT[r.type];
    // check roster status
    const re=getRosterEntry(bld.id,dateStr,r.id);
    const badge=(re.checkout?`<span style="font-size:8px;color:var(--amber);margin-left:2px">CO</span>`:re.checkin?`<span style="font-size:8px;color:var(--green);margin-left:2px">CI</span>`:``)+(re.departed?`<span style="font-size:8px;color:var(--teal);margin-left:2px">✓</span>`:``);
    return `<div class="sched-unit-pill" data-room="${r.id}" data-from="pool" onclick="schedTapPill(this,'${r.id}','pool')">
      <span style="color:${rt.color};font-size:14px">${rt.icon}</span>
      <span class="sched-pill-num">${escH(r.number)}</span>
      <span class="sched-pill-type" style="color:${rt.color}">${rt.short}${badge}</span>
      <span class="sched-pill-mins">${rt.mins}m</span>
    </div>`;
  }).join(''):`<div style="font-size:11px;color:var(--muted);padding:12px;text-align:center">All units scheduled</div>`;

  // Cleaner lanes
  const lanesHtml=cls.map(c=>{
    const assigned=getSchedule(bld.id,dateStr,c.id);
    const totalMins=assigned.reduce((s,rid)=>{const r=rooms.find(x=>x.id===rid);return s+(r?RT[r.type].mins:0);},0);
    const overloaded=totalMins>WINDOW;

    // Mini gantt
    let ganttSegs='',cursor=0;
    assigned.forEach(rid=>{
      const r=rooms.find(x=>x.id===rid);if(!r)return;
      const rt=RT[r.type];
      const w=Math.round((rt.mins/WINDOW)*100);
      ganttSegs+=`<div class="sched-gantt-seg" style="width:${w}%;background:${rt.color};border-right:1px solid var(--bg)" title="Unit ${r.number}"></div>`;
      cursor+=rt.mins;
    });

    const pills=assigned.map((rid,idx)=>{
      const r=rooms.find(x=>x.id===rid);if(!r)return'';
      const rt=RT[r.type];
      // calc start time
      let startMin=CHECKOUT_MIN;
      for(let i=0;i<idx;i++){const pr=rooms.find(x=>x.id===assigned[i]);if(pr)startMin+=RT[pr.type].mins;}
      const re=getRosterEntry(bld.id,dateStr,r.id);
      const badge=(re.checkout?`<span style="font-size:8px;color:var(--amber)">CO</span>`:re.checkin?`<span style="font-size:8px;color:var(--green)">CI</span>`:``)+(re.departed?`<span style="font-size:8px;color:var(--teal)">✓</span>`:``);
      return `<div class="sched-assigned-pill" data-room="${rid}" data-from="${c.id}" onclick="schedTapPill(this,'${rid}','${c.id}')">
        <span style="color:${rt.color};font-size:13px">${rt.icon}</span>
        <span style="font-weight:700">${escH(r.number)}</span>
        <span style="font-size:9px;color:${rt.color}">${rt.short}</span>
        ${badge}
        <span class="sched-time-tag">${timeStr(startMin)}</span>
        <span class="remove-btn" onclick="event.stopPropagation();schedReturnToPool('${rid}','${c.id}')">✕</span>
      </div>`;
    }).join('');

    return `<div class="sched-cleaner-lane" data-cleaner="${c.id}">
      <div class="sched-cleaner-lane-header">
        <div>
          <div class="sched-cleaner-name">${escH(c.name)}</div>
          <div class="sched-lane-stats" style="color:${overloaded?'var(--red)':'var(--muted)'}">
            ${assigned.length} units · ${totalMins}min ${overloaded?`<b style="color:var(--red)">⚠ +${totalMins-WINDOW}min over</b>`:'/ 300min window'}
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="clearCleanerSchedule('${bld.id}','${dateStr}','${c.id}')">Clear</button>
      </div>
      <div class="sched-gantt-mini" title="${totalMins}min total">${ganttSegs}<div style="flex:1;background:var(--surface2)"></div></div>
      <div class="sched-drop-zone${!assigned.length?' empty':''}" data-zone="${c.id}" style="margin-top:8px" onclick="schedTapZone('${c.id}')">${pills}</div>
    </div>`;
  }).join('');

  return `
  <div class="topbar"><h1>${escH(bld.name)} — Scheduler</h1></div>
  <div class="roster-date-nav fi">
    <button class="btn btn-ghost btn-sm" onclick="shiftSchedDate(-1)">← Prev</button>
    <input type="date" value="${dateStr}" onchange="schedDate=this.value;renderManagerMain()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;color:var(--text);font-size:12px"/>
    <button class="btn btn-ghost btn-sm" onclick="shiftSchedDate(1)">Next →</button>
    <h2>${fmtDate(dateStr)}</h2>
    <button class="btn btn-primary btn-sm" onclick="schedDate=todayStr();renderManagerMain()">Today</button>
    <button class="btn btn-violet btn-sm" onclick="autoSchedule('${bld.id}','${dateStr}')">⚡ Auto-schedule</button>
    <button class="btn btn-ghost btn-sm" onclick="schedFromRoster('${bld.id}','${dateStr}')">📋 From Roster</button>
  </div>

  <div id="sched-tap-banner" style="display:none;align-items:center;justify-content:space-between;background:var(--cyan-light);border:1px solid var(--cyan);border-radius:var(--rs);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--text);font-weight:600;position:sticky;top:0;z-index:10"></div>

  <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
    💡 <b style="color:var(--text)">Tap a unit</b> to select it, then <b style="color:var(--text)">tap a cleaner</b> to assign. Tap ✕ to return to pool. <b style="color:var(--amber)">CO</b>=checkout <b style="color:var(--green)">CI</b>=check-in today.
  </div>

  <div class="sched-builder fi">
    <div class="sched-pool">
      <div class="sched-pool-title">
        <span>UNIT POOL (${unscheduled.length} unscheduled)</span>
        <span style="color:var(--muted)">${rooms.length} total</span>
      </div>
      <div class="sched-pool-list" id="pool-list" data-zone="pool">${poolHtml}</div>
    </div>
    <div class="sched-cleaner-col" id="cleaner-col">${lanesHtml}</div>
  </div>`;
}

function shiftSchedDate(d){
  const dt=new Date(schedDate);dt.setDate(dt.getDate()+d);schedDate=dt.toISOString().slice(0,10);renderManagerMain();
}

function removeFromSchedule(bldId,dateStr,cleanerId,roomId){
  const cur=getSchedule(bldId,dateStr,cleanerId);
  setSchedule(bldId,dateStr,cleanerId,cur.filter(id=>id!==roomId));
  renderManagerMain();
}

function clearCleanerSchedule(bldId,dateStr,cleanerId){
  setSchedule(bldId,dateStr,cleanerId,[]);
  renderManagerMain();
}

function autoSchedule(bldId,dateStr){
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const cls=activeCleaner();if(!cls.length){alert('No cleaners on shift.');return;}
  // priority: 2-bed, 3-bed, 1-bed, studio, compact, urban
  const priority={TWO_BED:0,THREE_BED:1,ONE_BED:2,STUDIO:3,COMPACT:4,URBAN:5};
  const sorted=[...bld.rooms].sort((a,b)=>(priority[a.type]||9)-(priority[b.type]||9));
  // clear current schedule
  cls.forEach(c=>setSchedule(bldId,dateStr,c.id,[]));
  const loads={};cls.forEach(c=>{loads[c.id]=0;});
  sorted.forEach(room=>{
    const lightest=cls.reduce((a,b)=>loads[a.id]<=loads[b.id]?a:b);
    const cur=getSchedule(bldId,dateStr,lightest.id);
    setSchedule(bldId,dateStr,lightest.id,[...cur,room.id]);
    loads[lightest.id]+=RT[room.type].mins;
  });
  renderManagerMain();
}

function schedFromRoster(bldId,dateStr){
  // Only schedule units that have checkout on this date
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const cls=activeCleaner();if(!cls.length){alert('No cleaners on shift.');return;}
  const rosterDay=state.roster?.[bldId]?.[dateStr]||{};
  const checkoutUnits=bld.rooms.filter(r=>rosterDay[r.id]?.checkout);
  if(!checkoutUnits.length){alert('No check-outs marked on the roster for this date.\nGo to Roster to mark check-outs first.');return;}
  const priority={TWO_BED:0,THREE_BED:1,ONE_BED:2,STUDIO:3,COMPACT:4,URBAN:5};
  const sorted=[...checkoutUnits].sort((a,b)=>(priority[a.type]||9)-(priority[b.type]||9));
  cls.forEach(c=>setSchedule(bldId,dateStr,c.id,[]));
  const loads={};cls.forEach(c=>{loads[c.id]=0;});
  sorted.forEach(room=>{
    const lightest=cls.reduce((a,b)=>loads[a.id]<=loads[b.id]?a:b);
    const cur=getSchedule(bldId,dateStr,lightest.id);
    setSchedule(bldId,dateStr,lightest.id,[...cur,room.id]);
    loads[lightest.id]+=RT[room.type].mins;
  });
  renderManagerMain();
}

// ── DRAG AND DROP ──
// ── TAP-TO-ASSIGN SCHEDULER ──
let tapSelected={roomId:null,fromCleaner:null};

function initDrag(){
  // No-op — tap system uses inline onclick handlers
  updateTapUI();
}

function schedTapPill(el,roomId,from){
  const bldId=state.activeBuilding,dateStr=schedDate;
  // If a room is already selected and this is a cleaner zone tap via pill — assign
  if(tapSelected.roomId&&tapSelected.roomId!==roomId&&from!=='pool'){
    // Tapping an assigned pill in a lane while another room is selected = assign selected to this cleaner
    schedAssignTo(from);
    return;
  }
  // Deselect if tapping the same pill
  if(tapSelected.roomId===roomId){
    tapSelected={roomId:null,fromCleaner:null};
    updateTapUI();
    return;
  }
  // Select this pill
  tapSelected={roomId,fromCleaner:from==='pool'?null:from};
  updateTapUI();
}

function schedTapZone(cleanerId){
  if(!tapSelected.roomId) return;
  schedAssignTo(cleanerId);
}

function schedAssignTo(cleanerId){
  const{roomId,fromCleaner}=tapSelected;
  if(!roomId)return;
  const bldId=state.activeBuilding,dateStr=schedDate;
  // Remove from source cleaner if applicable
  if(fromCleaner&&fromCleaner!==cleanerId){
    setSchedule(bldId,dateStr,fromCleaner,getSchedule(bldId,dateStr,fromCleaner).filter(id=>id!==roomId));
  }
  // Add to target cleaner
  const cur=getSchedule(bldId,dateStr,cleanerId);
  if(!cur.includes(roomId)) setSchedule(bldId,dateStr,cleanerId,[...cur,roomId]);
  tapSelected={roomId:null,fromCleaner:null};
  saveState();
  renderManagerMain();
}

function schedReturnToPool(roomId,fromCleaner){
  if(!fromCleaner)return;
  const bldId=state.activeBuilding,dateStr=schedDate;
  setSchedule(bldId,dateStr,fromCleaner,getSchedule(bldId,dateStr,fromCleaner).filter(id=>id!==roomId));
  tapSelected={roomId:null,fromCleaner:null};
  saveState();
  renderManagerMain();
}

function updateTapUI(){
  // Highlight selected pill
  document.querySelectorAll('.sched-unit-pill,.sched-assigned-pill').forEach(el=>{
    el.classList.toggle('selected',el.dataset.room===tapSelected.roomId);
  });
  // Highlight all cleaner zones as tap targets when a room is selected
  document.querySelectorAll('.sched-drop-zone').forEach(zone=>{
    zone.classList.toggle('tap-ready',!!tapSelected.roomId);
  });
  // Show/hide the selection banner
  const banner=document.getElementById('sched-tap-banner');
  if(banner){
    if(tapSelected.roomId){
      const bldId=state.activeBuilding;
      const rooms=getBuildingRooms(bldId);
      const room=rooms.find(r=>r.id===tapSelected.roomId);
      const rt=room?RT[room.type]:null;
      banner.style.display='flex';
      banner.innerHTML=`<span>✓ Unit <b>${room?room.number:'?'}</b> selected${rt?' — '+rt.short:''} — tap a cleaner to assign</span>
        <button onclick="tapSelected={roomId:null,fromCleaner:null};updateTapUI()" style="background:none;border:none;color:var(--cyan);font-size:18px;cursor:pointer;padding:0 4px">✕</button>`;
    } else {
      banner.style.display='none';
    }
  }
}

// ═══════════════════════════════════════════
//  ROOMS VIEW
// ═══════════════════════════════════════════
function renderRooms(bld,rooms){
  const cls=activeCleaner();
  const floors=[...new Set(rooms.map(r=>r.floor))].sort((a,b)=>a-b);
  let visible=rooms;
  if(fFloor!=='all')visible=visible.filter(r=>r.floor==fFloor);
  if(fStatus!=='all')visible=visible.filter(r=>r.status===fStatus);
  if(fCleaner==='unassigned')visible=visible.filter(r=>!r.assignedTo);
  else if(fCleaner!=='all')visible=visible.filter(r=>r.assignedTo===fCleaner);

  const now=Date.now();
  const cards=visible.map(room=>{
    const rt=RT[room.type];
    const liveMin=room.status==='IN_PROGRESS'&&room.startedAt?Math.floor((now-room.startedAt)/60000):room.duration;
    const exp=rt.mins,barPct=liveMin!=null?Math.min(100,Math.round((liveMin/exp)*100)):0;
    const over=liveMin!=null&&liveMin>exp;
    const sl=room.status.toLowerCase();
    const clOpts=`<option value="">— unassigned —</option>`+cls.map(c=>`<option value="${c.id}"${room.assignedTo===c.id?' selected':''}>${escH(c.name)}</option>`).join('');
    let effHtml='';
    if(liveMin!=null){
      const p=Math.round((liveMin/exp)*100);const col=p<=100?'var(--green)':p<=125?'var(--amber)':'var(--red)';
      effHtml=`<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px">
        <span>${liveMin}min ${room.status==='IN_PROGRESS'?'elapsed':'taken'}</span>
        <span style="color:${col};font-weight:700">${p<=100?'✓ On time':p<=125?'⚠ Slow':'✕ Over'} (${p}%)</span></div>
        <div class="mini-bar"><div class="mini-bar-fill" style="background:${over?'var(--red)':'var(--green)'};width:${barPct}%"></div></div>`;
    }
    let actions='';
    if(room.status==='PENDING')actions=`<button class="btn btn-amber btn-sm" data-action="start" data-bld="${bld.id}" data-id="${room.id}">▶ START</button>`;
    else if(room.status==='IN_PROGRESS')actions=`<button class="btn btn-green btn-sm" data-action="done" data-bld="${bld.id}" data-id="${room.id}">✓ DONE</button><button class="btn btn-red btn-sm" data-action="flag" data-bld="${bld.id}" data-id="${room.id}">⚑</button>`;
    else actions=`<button class="btn btn-ghost btn-sm" data-action="reset" data-bld="${bld.id}" data-id="${room.id}">↺ Reset</button>`;
    return `<div class="room-card ${sl}">
      <div class="room-accent" style="background:${rt.color}"></div>
      <div class="room-header">
        <div><span class="room-num">Unit ${escH(room.number)}</span> <span class="room-type-tag" style="background:${rt.bg};color:${rt.color}">${rt.icon} ${rt.short}</span></div>
        <span class="status-chip chip-${sl}">${room.status.replace('_',' ')}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:7px">${fmtFloor(room.floor)} · ${exp}min expected</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
        <span style="font-size:10px;color:var(--muted);flex-shrink:0">CLEANER:</span>
        <select onchange="assignRoom('${bld.id}','${room.id}',this.value)" style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px">${clOpts}</select>
      </div>
      ${effHtml}
      <div class="room-actions">${actions}</div>
    </div>`;
  }).join('');

  return `<div class="topbar"><h1>${escH(bld.name)} — Units (${rooms.length})</h1>
    <button class="btn btn-primary btn-sm" onclick="autoAssign()">⚡ Auto-assign</button></div>
  <div class="filter-bar">
    <select onchange="fFloor=this.value;renderManagerMain()"><option value="all">All Floors</option>${floors.map(f=>`<option value="${f}">${fmtFloor(f)}</option>`).join('')}</select>
    <select onchange="fStatus=this.value;renderManagerMain()"><option value="all">All Statuses</option><option value="PENDING">Pending</option><option value="IN_PROGRESS">In Progress</option><option value="DONE">Done</option><option value="FLAGGED">Flagged</option></select>
    <select onchange="fCleaner=this.value;renderManagerMain()"><option value="all">All Cleaners</option>${cls.map(c=>`<option value="${c.id}">${escH(c.name)}</option>`).join('')}<option value="unassigned">Unassigned</option></select>
    <span class="count">${visible.length} shown</span>
  </div>
  <div class="room-grid fi">${cards||'<div style="color:var(--muted);padding:20px">No units match filters.</div>'}</div>`;
}

// ═══════════════════════════════════════════
//  CLEANERS VIEW
// ═══════════════════════════════════════════
function renderCleaners(rooms){
  const cls=activeCleaner();
  const cards=cls.map(c=>{
    const ar=rooms.filter(r=>r.assignedTo===c.id);
    const cd=ar.filter(r=>r.status==='DONE');
    const ci=ar.filter(r=>r.status==='IN_PROGRESS');
    const cf=ar.filter(r=>r.status==='FLAGGED');
    let eff=null;
    if(cd.length)eff=Math.round(cd.reduce((s,r)=>s+(r.duration/RT[r.type].mins),0)/cd.length*100);
    const effC=!eff?'var(--muted)':eff<=100?'var(--green)':eff<=125?'var(--amber)':'var(--red)';
    const flagHtml=cf.length?`<div style="background:var(--red-light);border-radius:6px;padding:9px;margin-top:9px;border:1px solid #F5C0C0">
      <div style="font-size:9px;color:var(--red);font-weight:700;margin-bottom:4px">⚑ FLAGGED</div>
      ${cf.map(r=>'<div style="font-size:11px;color:var(--red);margin-bottom:2px">Unit '+escH(r.number)+' — '+(r.duration||'?')+'min / '+RT[r.type].mins+'min</div>').join('')}
    </div>`:'';
    const bars=[{l:'Done',v:cd.length,col:'var(--green)'},{l:'Active',v:ci.length,col:'var(--amber)'},{l:'Flagged',v:cf.length,col:'var(--red)'}]
      .map(b=>`<div class="stat-bar"><div class="stat-bar-labels"><span>${b.l}</span><span>${b.v}/${ar.length}</span></div>
        <div class="mini-bar"><div class="mini-bar-fill" style="background:${b.col};width:${ar.length?Math.round(b.v/ar.length*100):0}%"></div></div></div>`).join('');
    return `<div class="cleaner-card fi">
      <div class="cleaner-header">
        <div><div style="font-size:15px;font-weight:700">${escH(c.name)}</div><div style="font-size:10px;color:var(--muted);margin-top:1px">${ar.length} units assigned</div></div>
        <div class="eff-ring" style="border-color:${effC}"><div class="eff-num" style="color:${effC}">${eff||'—'}${eff?'%':''}</div><div style="font-size:8px;color:var(--muted)">EFF</div></div>
      </div>
      ${bars}${flagHtml}
    </div>`;
  }).join('');
  return `<div class="topbar"><h1>Cleaners — ${escH(currentBld().name)}</h1></div>
  <div class="cleaner-grid">${cards||'<div style="color:var(--muted)">No cleaners.</div>'}</div>`;
}

      UNITS <span style="color:var(--muted);font-weight:400;font-size:10px">${rooms.length} total</span>

// ── Unit CRUD ──
let _editBldId=null,_editRoomId=null;
function openAddUnit(){
  _editBldId=state.activeBuilding;_editRoomId=null;
  document.getElementById('u-number').value='';
  document.getElementById('u-type').value='COMPACT';
  document.getElementById('u-floor').value='1';
  document.getElementById('u-err').textContent='';
  document.getElementById('modal-unit-title').textContent='Add Unit';
  openModal('modal-unit');
}
function openEditUnit(bldId,roomId){
  const bld=state.buildings.find(b=>b.id===bldId);
  const room=bld&&bld.rooms.find(r=>r.id===roomId);if(!room)return;
  _editBldId=bldId;_editRoomId=roomId;
  document.getElementById('u-number').value=room.number;
  document.getElementById('u-type').value=room.type;
  document.getElementById('u-floor').value=room.floor;
  document.getElementById('u-err').textContent='';
  document.getElementById('modal-unit-title').textContent='Edit Unit';
  openModal('modal-unit');
}
function saveUnit(){
  const number=document.getElementById('u-number').value.trim();
  const type=document.getElementById('u-type').value;
  const floorRaw=document.getElementById('u-floor').value.trim();
  // Accept 'G' or '0' or 'Ground' as ground floor, else parse as int
  const floor=(floorRaw===''||floorRaw==='1')?1:
    (floorRaw.toLowerCase()==='g'||floorRaw==='0'||floorRaw.toLowerCase().startsWith('ground'))?0:
    (parseInt(floorRaw)||1);
  const errEl=document.getElementById('u-err');
  if(!number){errEl.textContent='Enter a unit number.';return;}
  const bld=state.buildings.find(b=>b.id===_editBldId);
  if(!bld){errEl.textContent='Building not found.';return;}
  if(_editRoomId){
    // Editing existing unit — update in place
    const idx=bld.rooms.findIndex(r=>r.id===_editRoomId);
    if(idx>=0)bld.rooms[idx]={...bld.rooms[idx],number,type,floor};
  }else{
    // Adding new unit — check for duplicate number
    if(bld.rooms.find(r=>r.number===number)){errEl.textContent='Unit number already exists.';return;}
    bld.rooms.push(makeRoom(bld.id,number,type,floor));
  }
  saveState();closeModal('modal-unit');renderManagerMain();
}
function removeUnit(bldId,roomId){
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const room=bld.rooms.find(r=>r.id===roomId);if(!room)return;
  if(!confirm(`Remove unit ${room.number} from ${bld.name}?`))return;
  bld.rooms=bld.rooms.filter(r=>r.id!==roomId);
  saveState();renderManagerMain();
}
function autoNumberUnits(bldId){
  if(!confirm('Auto-number all units by floor?'))return;
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const sorted=[...bld.rooms].sort((a,b)=>a.floor-b.floor);
  const counts={};
  sorted.forEach(room=>{
    if(!counts[room.floor])counts[room.floor]=1;
    const pos=counts[room.floor]++;
    const idx=bld.rooms.findIndex(r=>r.id===room.id);
    bld.rooms[idx].number=`${room.floor}${String(pos).padStart(2,'0')}`;
  });
  saveState();renderManagerMain();
}

// ── Cleaner CRUD ──
function saveCleaner(id){
  const name=document.getElementById('cl-name-'+id)?.value.trim();
  const pin=document.getElementById('cl-pin-'+id)?.value.trim();
  if(!name){showManageMsg('Enter a name.','err');return;}
  if(!/^\d{4}$/.test(pin)){showManageMsg('PIN must be 4 digits.','err');return;}
  const cl=state.cleaners.find(c=>c.id===id);if(!cl)return;
  cl.name=name;cl.pin=pin;saveState();
  showManageMsg(`✓ ${name} saved.`,'ok');renderManager();
}
function addNewCleaner(){
  const id='c'+Date.now();state.cleaners.push({id,name:'New Cleaner',pin:'0000'});
  saveState();renderManagerMain();
  setTimeout(()=>{const el=document.getElementById('cl-name-'+id);if(el){el.select();el.scrollIntoView({behavior:'smooth',block:'center'});}},80);
}
function removeCleaner(id){
  const cl=state.cleaners.find(c=>c.id===id);if(!cl)return;
  if(!confirm(`Remove "${cl.name}"?`))return;
  state.buildings.forEach(bld=>bld.rooms.forEach(r=>{if(r.assignedTo===id)r.assignedTo=null;}));
  state.cleaners=state.cleaners.filter(c=>c.id!==id);
  saveState();renderManager();
}
function showManageMsg(msg,type){
  const el=document.getElementById('manage-msg');if(!el)return;
  el.style.color=type==='err'?'var(--red)':'var(--green)';el.textContent=msg;
  setTimeout(()=>{el.textContent='';},3000);
}

// ── Manager Account CRUD ──
function saveManagerAccount(id){
  const name=document.getElementById('mgr-name-'+id)?.value.trim();
  const pin=document.getElementById('mgr-pin-'+id)?.value.trim();
  if(!name){showManageMsg('Enter a name.','err');return;}
  if(pin&&!/^\d{4}$/.test(pin)){showManageMsg('PIN must be 4 digits (or leave blank for first-login setup).','err');return;}
  const mgr=(state.managers||[]).find(m=>m.id===id);if(!mgr)return;
  mgr.name=name;mgr.pin=pin;saveState();
  showManageMsg(`✓ ${name} saved.`,'ok');renderManagerMain();
}
function removeManagerAccount(id){
  const mgr=(state.managers||[]).find(m=>m.id===id);if(!mgr)return;
  if(!confirm(`Remove manager "${mgr.name}"?`))return;
  state.managers=state.managers.filter(m=>m.id!==id);
  saveState();renderManagerMain();
}

// ── Room actions ──
function bindActions(){
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const{action,bld,id}=this.dataset;
      if(action==='start')doStartRoom(bld,id);
      else if(action==='done')doDoneRoom(bld,id);
      else if(action==='flag')doFlagRoom(bld,id);
      else if(action==='reset')doResetRoom(bld,id);
    });
  });
}
function assignRoom(bldId,roomId,cleanerId){updateRoom(bldId,roomId,{assignedTo:cleanerId||null});}
function doStartRoom(b,id){updateRoom(b,id,{status:'IN_PROGRESS',startedAt:Date.now(),completedAt:null,duration:null});renderManagerMain();}
function doDoneRoom(b,id){
  const bld=state.buildings.find(x=>x.id===b);
  const room=bld&&bld.rooms.find(r=>r.id===id);if(!room)return;
  const dur=room.startedAt?Math.floor((Date.now()-room.startedAt)/60000):RT[room.type].mins;
  updateRoom(b,id,{status:dur>RT[room.type].mins*1.4?'FLAGGED':'DONE',completedAt:Date.now(),duration:dur});
  renderManagerMain();
}
function doFlagRoom(b,id){updateRoom(b,id,{status:'FLAGGED'});renderManagerMain();}
function doResetRoom(b,id){updateRoom(b,id,{status:'PENDING',startedAt:null,completedAt:null,duration:null,assignedTo:null});renderManagerMain();}
function autoAssign(){
  const bld=currentBld();if(!bld)return;
  const cls=activeCleaner();if(!cls.length){alert('No cleaners on shift.');return;}
  const loads={};cls.forEach(c=>{loads[c.id]=0;});
  bld.rooms.forEach(r=>{const lightest=cls.reduce((a,b)=>loads[a.id]<=loads[b.id]?a:b);r.assignedTo=lightest.id;loads[lightest.id]+=RT[r.type].mins;});
  saveState();renderManagerMain();
}
function resetBuilding(){
  const bld=currentBld();if(!bld)return;
  if(!confirm(`Reset all rooms in ${bld.name} to PENDING?\n\nThis will save today's data to History first.`))return;
  snapshotDay(bld.id); // save before clearing
  bld.rooms.forEach(r=>{r.status='PENDING';r.startedAt=null;r.completedAt=null;r.duration=null;r.assignedTo=null;});
  saveState();renderManagerMain();
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

let caView='schedule';

function caNav(v){
  if(v==='logout'){logout();return;}
  caView=v;
  document.querySelectorAll('.ca-nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('canav-'+v);if(el)el.classList.add('active');
  renderCaContent();
}

function renderCleaner(){
  if(!currentCleaner)return;
  // SECURITY: verify cleaner still exists in state (PIN already checked at login)
  const verified=state.cleaners.find(c=>c.id===currentCleaner.id);
  if(!verified){logout();return;}
  currentCleaner=verified; // keep in sync with latest name/pin

  document.getElementById('ca-name-display').textContent=currentCleaner.name;
  updateCaClocks();
  caView='schedule';
  document.querySelectorAll('.ca-nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('canav-schedule');if(el)el.classList.add('active');
  renderCaContent();
  clearInterval(window._caClockTimer);
  window._caClockTimer=setInterval(updateCaClocks,30000);
  clearInterval(window._caTimer);
  window._caTimer=setInterval(updateCaTimers,10000);
}

function updateCaClocks(){
  const now=nowMin(),left=Math.max(0,CHECKIN_MIN-now);
  const el=document.getElementById('ca-clock');if(el)el.textContent=timeStr(now);
  const el2=document.getElementById('ca-time-left');if(el2)el2.textContent=left>0?`${left}min to check-in`:'Check-in open';
}

// Returns ONLY this cleaner's rooms for today, in schedule order
// Strictly isolated — cleaner cannot see other cleaners' rooms
function getMyRooms(){
  if(!currentCleaner)return[];
  const all=[];
  const dateStr=todayStr();
  state.buildings.forEach(bld=>{
    // Check if a manual schedule exists for this cleaner today in this building
    const sched=getSchedule(bld.id,dateStr,currentCleaner.id);
    if(sched.length){
      // Use schedule order exactly
      sched.forEach(rid=>{
        const r=bld.rooms.find(x=>x.id===rid);
        // Only include if still assigned to this cleaner (or schedule overrides assignment)
        if(r)all.push({...r,bldName:bld.name,bldId:bld.id});
      });
    }else{
      // Fall back: rooms assigned via assignedTo field
      bld.rooms
        .filter(r=>r.assignedTo===currentCleaner.id)
        .forEach(r=>all.push({...r,bldName:bld.name,bldId:bld.id}));
    }
  });
  return all;
}

function updateCaTimers(){
  if(!currentCleaner)return;
  getMyRooms().filter(r=>r.status==='IN_PROGRESS'&&r.startedAt).forEach(room=>{
    const tel=document.getElementById('catimer-'+room.id);
    if(tel){
      const min=Math.floor((Date.now()-room.startedAt)/60000);
      tel.textContent=`${min}min`;
      tel.className='ca-timer'+(min>RT[room.type].mins?' over':'');
    }
  });
}

function caRosterBadge(bldId,roomId){
  const re=getRosterEntry(bldId,todayStr(),roomId);
  const dep=re.departed?`<span style="font-size:9px;background:#E0F4F5;color:var(--teal);border:1px solid var(--teal);border-radius:3px;padding:1px 6px;margin-left:4px">✓ DEPARTED</span>`:'';
  const inh=re.inhouse?`<span style="font-size:9px;background:#EEE8FF;color:var(--violet);border:1px solid var(--violet);border-radius:3px;padding:1px 6px;margin-left:4px">🏠 IN HOUSE</span>`:'';
  if(re.checkout&&re.checkin)return`<span style="font-size:9px;background:#1a001a;color:var(--violet);border:1px solid var(--violet);border-radius:3px;padding:1px 6px;margin-left:4px">↕ TURNOVER</span>`+dep+inh;
  if(re.checkout)return`<span style="font-size:9px;background:#1a1000;color:var(--amber);border:1px solid var(--amber);border-radius:3px;padding:1px 6px;margin-left:4px">↑ CHECKOUT</span>`+dep+inh;
  if(re.checkin) return`<span style="font-size:9px;background:#001a0a;color:var(--green);border:1px solid var(--green);border-radius:3px;padding:1px 6px;margin-left:4px">↓ CHECK-IN</span>`+dep+inh;
  return dep+inh;
}

function renderCaContent(){
  const el=document.getElementById('ca-content');if(!el)return;
  if(!currentCleaner){el.innerHTML='';return;}

  const myRooms=getMyRooms();
  const total=myRooms.length;
  const done=myRooms.filter(r=>r.status==='DONE'||r.status==='FLAGGED');
  const inprog=myRooms.filter(r=>r.status==='IN_PROGRESS');
  const pending=myRooms.filter(r=>r.status==='PENDING'||r.status==='IN_PROGRESS');
  const pct=total?Math.round((done.length/total)*100):0;

  // Progress bar
  const progressBar=`
    <div style="background:var(--surface);padding:14px 16px;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px">
        <span>${done.length} of ${total} units done</span>
        <span style="color:${pct===100?'var(--green)':'var(--text)'};font-weight:700">${pct}%</span>
      </div>
      <div style="height:6px;background:var(--surface2);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--cyan)'};border-radius:4px;transition:width .5s"></div>
      </div>
    </div>`;

  const statsHtml=`<div class="ca-stats">
    <div class="ca-stat"><div class="num" style="color:var(--amber)">${pending.length}</div><div class="lbl">TO DO</div></div>
    <div class="ca-stat"><div class="num" style="color:var(--cyan)">${inprog.length}</div><div class="lbl">ACTIVE</div></div>
    <div class="ca-stat"><div class="num" style="color:var(--green)">${done.length}</div><div class="lbl">DONE</div></div>
  </div>`;

  // ── SCHEDULE TAB — read-only day overview ──
  if(caView==='schedule'){
    if(!total){
      el.innerHTML=progressBar+`<div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:12px">📋</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">No schedule yet</div>
        <div style="font-size:11px;margin-top:6px;color:var(--muted)">Your manager hasn't assigned you any units today.</div>
      </div>`;
      return;
    }

    // Group by building, keep schedule order
    const byBld={};
    myRooms.forEach(r=>{
      if(!byBld[r.bldId])byBld[r.bldId]={name:r.bldName,rooms:[]};
      byBld[r.bldId].rooms.push(r);
    });

    // Calc expected start times
    let cursor=CHECKOUT_MIN;
    let schedHtml='';
    Object.values(byBld).forEach(grp=>{
      schedHtml+=`<div class="ca-section-label">🏢 ${escH(grp.name)}</div>
        <div style="padding:8px 14px;display:flex;flex-direction:column;gap:8px">`;
      grp.rooms.forEach((room,idx)=>{
        const rt=RT[room.type];
        const startT=timeStr(cursor);
        const endT=timeStr(cursor+rt.mins);
        const re=getRosterEntry(room.bldId,todayStr(),room.id);
        const badge=caRosterBadge(room.bldId,room.id);
        const guestLine=re.guest?`<div style="font-size:10px;color:var(--muted);margin-top:2px">👤 ${escH(re.guest)}</div>`:'';
        const statusColor=room.status==='DONE'?'var(--green)':room.status==='IN_PROGRESS'?'var(--amber)':room.status==='FLAGGED'?'var(--red)':'var(--muted)';
        const statusIcon=room.status==='DONE'?'✓':room.status==='IN_PROGRESS'?'⟳':room.status==='FLAGGED'?'⚑':'○';

        schedHtml+=`<div style="display:flex;gap:10px;align-items:stretch">
          <!-- Time column -->
          <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:40px">
            <div style="font-size:10px;font-weight:700;color:var(--cyan)">${startT}</div>
            <div style="flex:1;width:2px;background:var(--border);margin:3px 0"></div>
            <div style="font-size:9px;color:var(--muted)">${endT}</div>
          </div>
          <!-- Card -->
          <div style="flex:1;background:var(--surface);border:1px solid ${room.status==='IN_PROGRESS'?'var(--amber)':room.status==='FLAGGED'?'var(--red)':room.status==='DONE'?'var(--border)':'var(--border)'};border-radius:var(--r);padding:11px 13px;position:relative;overflow:hidden;opacity:${room.status==='DONE'?'.6':'1'}">
            <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${rt.color};border-radius:10px 0 0 10px"></div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
              <div>
                <span style="font-size:16px;font-weight:700">Unit ${escH(room.number)}</span>
                <span style="font-size:10px;color:${rt.color};font-weight:700;margin-left:6px">${rt.icon} ${rt.short}</span>
                ${badge}
              </div>
              <span style="font-size:13px;color:${statusColor};font-weight:700">${statusIcon}</span>
            </div>
            <div style="font-size:10px;color:var(--muted)">${fmtFloor(room.floor)} · ${rt.mins}min</div>
            ${guestLine}
          </div>
        </div>`;
        cursor+=rt.mins;
      });
      schedHtml+='</div>';
    });

    // Totals footer
    const totalMins=myRooms.reduce((s,r)=>s+RT[r.type].mins,0);

        const timerHtml=isActive?`
          <div class="ca-timer${over?' over':''}" id="catimer-${room.id}">${liveMin||0}min</div>
          <div class="mini-bar"><div class="mini-bar-fill" style="background:${over?'var(--red)':'var(--green)'};width:${barPct}%"></div></div>
          <div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:8px">Expected: ${targetMins}min${re.departed?' (departure clean)':''}</div>`:'';

        // ── ACTION AREA ──

          actionHtml=`<button class="btn btn-amber" style="width:100%;padding:14px;font-size:13px" onclick="caStart('${room.bldId}','${room.id}')">▶ START CLEANING</button>`;

                padding:14px;cursor:pointer;user-select:none;transition:.15s;min-height:56px"
                onclick="caDone('${room.bldId}','${room.id}')">
                <span style="width:26px;height:26px;border:2.5px solid var(--green);border-radius:6px;
                  display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff">
                  <span style="font-size:16px;color:var(--green);line-height:1"></span>
                </span>
                <span style="font-weight:700;font-size:14px;color:var(--green)">Mark as Done</span>
              </label>
              <!-- Flag button -->
              <button onclick="caFlag('${room.bldId}','${room.id}')"
                style="width:56px;min-height:56px;border-radius:var(--r);border:2px solid #F5C0C0;
                background:var(--red-light);display:flex;flex-direction:column;align-items:center;
                justify-content:center;gap:3px;cursor:pointer;flex-shrink:0;transition:.15s"
                title="Flag this unit for manager attention">
                <span style="font-size:20px">⚑</span>
                <span style="font-size:8px;color:var(--red);font-weight:700;font-family:Inter,sans-serif">FLAG</span>
              </button>
            </div>`;
        }

        const cardBg=re.departed?'background:#D6F4F6;':re.inhouse?'background:#EEE8FF;':'';
        listHtml+=`<div class="ca-room ${isActive?'ca-active':''}" id="caroom-${room.id}" style="${cardBg}">
          <div class="room-accent" style="background:${rt.color}"></div>
          <div class="ca-room-top">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="ca-room-num">Unit ${escH(room.number)}</span>
              <span style="font-size:10px;color:${rt.color};font-weight:700">${rt.icon} ${rt.short}</span>
              ${badge}
            </div>
            <span class="status-chip chip-${room.status.toLowerCase()}">${room.status.replace('_',' ')}</span>
          </div>
          <div style="font-size:10px;color:var(--muted);margin:4px 0 6px">${fmtFloor(room.floor)} · ${targetMins}min expected${re.departed?' (departure clean)':''}</div>
          ${depTag}${guestTag}${timerHtml}
          <div class="ca-room-actions">${actionHtml}</div>
        </div>`;
      });
      listHtml+='</div>';
    });
    el.innerHTML=progressBar+statsHtml+listHtml;
    return;
  }

  // ── DONE TAB ──
  if(caView==='done'){
    if(!done.length){
      el.innerHTML=progressBar+statsHtml+`<div style="text-align:center;padding:60px 20px;color:var(--muted)">No completed units yet.</div>`;
      return;
    }
    const doneList=done.map(room=>{
      const rt=RT[room.type];
      const reD=getRosterEntry(room.bldId,todayStr(),room.id);
      const exp=reD.departed?rt.depMins:rt.mins;
      const dur=room.duration||'?';
      const pct=room.duration?Math.round((room.duration/exp)*100):null;
      const effC=!pct?'var(--muted)':pct<=100?'var(--green)':pct<=125?'var(--amber)':'var(--red)';
      const effLabel=!pct?'':pct<=100?' ✓':pct<=125?' ⚠':' ✕';
      const isFlagged=room.status==='FLAGGED';
      return `<div class="ca-room ca-done-item${isFlagged?' ca-flagged':''}" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px">
        <div>
          <div style="font-weight:700">Unit ${escH(room.number)} <span style="font-size:10px;color:${rt.color}">${rt.icon} ${rt.short}</span></div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${escH(room.bldName)} · ${fmtFloor(room.floor)}</div>
          ${isFlagged?'<div style="font-size:10px;color:var(--red);font-weight:700;margin-top:3px">⚑ Flagged for manager</div>':''}
        </div>
        <div style="text-align:right">
          <div style="color:${effC};font-weight:700">${dur}min${effLabel}</div>
          ${pct?'<div style="font-size:10px;color:'+effC+'">'+pct+'% of '+exp+'min</div>':''}
          <span class="status-chip chip-${room.status.toLowerCase()}" style="margin-top:4px;display:inline-block">${room.status}</span>
        </div>
      </div>`;
    }).join('');
    el.innerHTML=progressBar+statsHtml+`<div class="ca-room-list">${doneList}</div>`;
  }
}

function caStart(bldId,roomId){
  // Security: only allow if this room belongs to current cleaner's schedule
  const myRooms=getMyRooms();
  if(!myRooms.find(r=>r.id===roomId)){return;}
  updateRoom(bldId,roomId,{status:'IN_PROGRESS',startedAt:Date.now()});
  renderCaContent();
}
function caDone(bldId,roomId){
  // Security: only allow if this room belongs to current cleaner's schedule
  const myRooms=getMyRooms();
  if(!myRooms.find(r=>r.id===roomId)){return;}
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const room=bld.rooms.find(r=>r.id===roomId);if(!room)return;
  const dur=room.startedAt?Math.floor((Date.now()-room.startedAt)/60000):RT[room.type].mins;
  updateRoom(bldId,roomId,{status:'DONE',completedAt:Date.now(),duration:dur});
  renderCaContent();
}
function caFlag(bldId,roomId){
  // Security: only allow if this room belongs to current cleaner's schedule
  const myRooms=getMyRooms();
  if(!myRooms.find(r=>r.id===roomId)){return;}
  const bld=state.buildings.find(b=>b.id===bldId);if(!bld)return;
  const room=bld.rooms.find(r=>r.id===roomId);if(!room)return;
  if(!confirm('Flag this unit for manager attention?\n\nIt will appear as flagged on the manager dashboard.'))return;
  const dur=room.startedAt?Math.floor((Date.now()-room.startedAt)/60000):null;
  updateRoom(bldId,roomId,{status:'FLAGGED',completedAt:Date.now(),duration:dur});
  renderCaContent();
}

// ═══════════════════════════════════════════
//  INIT — wait for Firebase then boot
// ═══════════════════════════════════════════
async function boot(){
  // Wait for Firebase module to signal ready (max 8s)
  if(!window._fbReady){
    await new Promise((resolve,reject)=>{
      const t=setTimeout(()=>reject(new Error('Firebase timeout')),8000);
      document.addEventListener('firebase-ready',()=>{clearTimeout(t);resolve();},{once:true});
    }).catch(()=>{});
  }

  const ok=await loadState();
  checkDailySnapshot();

  // Set logo images using embedded base64
  ['login-logo-img','loading-logo'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.src=LOGO_BLUE;
  });
  ['sidebar-logo-img','ca-logo-img'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.src=LOGO_TRANS;
  });

  // Hide loading, show login
  document.getElementById('loading-screen').classList.remove('active');
  showScreen('login');
  renderLoginForm();

  // Show connection status briefly
  if(!ok){
    const msg=document.getElementById('loading-msg');
    if(msg)msg.textContent='⚠ Running in offline mode';
  }

  document.querySelectorAll('.modal-overlay').forEach(el=>{
    el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
  });

  // Refresh manager view every 30s for live timers
  setInterval(()=>{
    if(document.getElementById('manager-screen').classList.contains('active'))renderManagerMain();
  },30000);
}

boot();
</script>
